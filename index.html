<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAP-C02 演習 | aws-sap-study</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#0F1117;--surface:#1A1D27;--surface2:#22263A;--border:#2D3149;--border2:#3A3F5C;
  --text:#E6EDF3;--muted:#7D8590;--hint:#4A5568;
  --blue:#4F8EF7;--blue-dim:#1E2D4F;--blue-text:#93BFFC;
  --green:#34D058;--green-dim:#0D2E1A;--green-text:#56E87A;
  --red:#F85149;--red-dim:#2E0D0D;--red-text:#FF7B72;
  --amber:#E3B341;--amber-dim:#2A1F06;--amber-text:#F0C96A;
  --purple:#C084FC;--purple-dim:#1E1030;--purple-text:#D8A4FC;
  --teal:#39D353;--teal-dim:#0A2E1C;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* layout */
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem 6rem}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:8px;flex-wrap:wrap}
.hdr-left h1{font-size:18px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.hdr-left p{font-size:12px;color:var(--muted);margin-top:2px}
.hdr-right{display:flex;gap:8px;align-items:center}
.btn-study{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border2);color:var(--muted);font-size:13px;text-decoration:none;transition:all .2s}
.btn-study:hover{border-color:var(--blue);color:var(--blue-text)}
.btn-ghost{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);background:transparent;border:1px solid transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:var(--surface);color:var(--text)}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.stat-l{font-size:11px;color:var(--muted);margin-top:1px}

/* category filter */
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.cat{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s}
.cat:hover:not(:disabled){border-color:var(--border2);color:var(--text)}
.cat.on{background:var(--blue-dim);border-color:var(--blue);color:var(--blue-text)}
.cat:disabled{opacity:.3;cursor:not-allowed}
.cat-cnt{font-size:10px;opacity:.7}

/* progress */
.prog-track{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#7CB9FF);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* question card */
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.375rem;margin-bottom:1rem}
.qmeta{display:flex;gap:6px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;border:1px solid transparent}
.b-blue{background:var(--blue-dim);color:var(--blue-text);border-color:rgba(79,142,247,.3)}
.b-purple{background:var(--purple-dim);color:var(--purple-text);border-color:rgba(192,132,252,.3)}
.b-amber{background:var(--amber-dim);color:var(--amber-text);border-color:rgba(227,179,65,.3)}
.b-red{background:var(--red-dim);color:var(--red-text);border-color:rgba(248,81,73,.3)}
.b-green{background:var(--green-dim);color:var(--green-text);border-color:rgba(52,208,88,.3)}
.b-teal{background:var(--teal-dim);color:#6EE7A0;border-color:rgba(57,211,83,.3)}
.b-coral{background:#2E100A;color:#FFA07A;border-color:rgba(255,100,50,.3)}
.qnum{font-size:12px;color:var(--hint);margin-left:auto;font-variant-numeric:tabular-nums}
.qtxt{font-size:15px;line-height:1.75;margin-bottom:1.125rem;color:var(--text)}

/* options — signature animation */
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.125rem}
.opt{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 13px;
  border-radius:var(--r);
  border:1px solid var(--border);
  border-left:3px solid transparent;
  cursor:pointer;
  background:var(--surface2);
  transition:border-color .15s, background .15s;
  position:relative;overflow:hidden;
}
.opt:hover:not(.dis){border-color:var(--border2);border-left-color:var(--blue);background:#252942}
.opt.ok{background:var(--green-dim);border-color:rgba(52,208,88,.4);border-left-color:var(--green);animation:slideIn .25s ease}
.opt.ng{background:var(--red-dim);border-color:rgba(248,81,73,.4);border-left-color:var(--red);animation:slideIn .25s ease}
.opt.show-ok{background:var(--green-dim);border-color:rgba(52,208,88,.4);border-left-color:var(--green)}
.opt.dis{cursor:default}
@keyframes slideIn{from{transform:translateX(-4px);opacity:.7}to{transform:translateX(0);opacity:1}}
.opt-k{width:24px;height:24px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0;margin-top:1px;transition:all .2s}
.opt.ok .opt-k{background:var(--green);color:#000;border-color:var(--green)}
.opt.show-ok .opt-k{background:var(--green);color:#000;border-color:var(--green)}
.opt.ng .opt-k{background:var(--red);color:#fff;border-color:var(--red)}
.opt-t{font-size:13.5px;line-height:1.6;color:var(--text)}

/* explanation */
.exp{display:none;margin-bottom:1rem}
.exp.show{display:block}
.exp-why{background:var(--blue-dim);border:1px solid rgba(79,142,247,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.exp-lbl{font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.exp-lbl.lbl-why{color:var(--blue-text)}
.exp-lbl.lbl-trap{color:var(--amber-text)}
.exp-txt{font-size:13px;line-height:1.7}
.exp-txt.txt-why{color:#B3D4FC}
.exp-trap{background:var(--amber-dim);border:1px solid rgba(227,179,65,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.exp-txt.txt-trap{color:#E8D08A}
.cmp-wrap{overflow-x:auto;margin-bottom:8px}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:440px}
.cmp-tbl th{background:var(--bg);padding:7px 10px;text-align:left;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
.cmp-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);line-height:1.5;color:var(--text)}
.cmp-tbl tr:last-child td{border-bottom:none}
.cmp-tbl .rec td{background:rgba(52,208,88,.07);color:var(--green-text)}
.kws{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.kw{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* actions */
.actions{display:flex;gap:8px;justify-content:space-between;align-items:center}
.btn-p{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);background:var(--blue);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-p:hover{background:#3A7AE8}
.streak{font-size:12px;background:var(--amber-dim);color:var(--amber-text);border:1px solid rgba(227,179,65,.3);padding:3px 10px;border-radius:6px}

/* result */
.result{display:none;text-align:center;padding:3rem 1rem 2rem}
.result.show{display:block}
.result-ring{width:100px;height:100px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;position:relative}
.result-ring svg{position:absolute;top:-3px;left:-3px;transform:rotate(-90deg)}
.result-sc{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
.result-sub{font-size:12px;color:var(--muted);margin-top:2px}
.result-msg{font-size:15px;color:var(--text);margin:1rem auto;max-width:360px;line-height:1.6}
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:1.25rem 0;text-align:left}
.domain-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.domain-name{font-size:12px;font-weight:600;margin-bottom:4px}
.domain-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:3px}
.domain-bar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .6s .2s}
.domain-rate{font-size:11px;color:var(--muted)}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}

/* mobile bottom nav */
@media(max-width:540px){
  .wrap{padding:1rem .875rem 5rem}
  .hdr-left h1{font-size:16px}
  .stats{grid-template-columns:repeat(4,1fr);gap:5px}
  .stat{padding:8px 4px}
  .stat-n{font-size:18px}
  .stat-l{font-size:10px}
  .qtxt{font-size:14px}
  .opt-t{font-size:13px}
  .qcard{padding:1rem}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <h1><i class="ti ti-certificate" style="color:var(--blue);font-size:20px"></i>SAP-C02 演習</h1>
      <p>1問ごとに「なぜ？」まで理解する</p>
    </div>
    <div class="hdr-right">
      <a href="study.html" class="btn-study"><i class="ti ti-book" style="font-size:14px"></i>参考書</a>
      <button class="btn-ghost" onclick="restart()"><i class="ti ti-refresh" style="font-size:14px"></i></button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">回答済</div></div>
    <div class="stat"><div class="stat-n" id="sOk" style="color:var(--green)">0</div><div class="stat-l">正解</div></div>
    <div class="stat"><div class="stat-n" id="sNg" style="color:var(--red)">0</div><div class="stat-l">不正解</div></div>
    <div class="stat"><div class="stat-n" id="sRate" style="color:var(--blue)">—</div><div class="stat-l">正答率</div></div>
  </div>

  <div class="cats" id="catRow"></div>

  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="qcard" id="qCard">
    <div class="qmeta">
      <span class="badge b-blue" id="qCat">—</span>
      <span class="badge" id="qDiff">—</span>
      <span class="badge b-purple" id="qDomain">—</span>
      <span class="qnum" id="qNum">— / —</span>
    </div>
    <p class="qtxt" id="qTxt"></p>
    <div class="opts" id="opts"></div>
    <div class="exp" id="exp">
      <div class="exp-why">
        <div class="exp-lbl lbl-why"><i class="ti ti-bulb" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>正解の理由</div>
        <div class="exp-txt txt-why" id="expWhy"></div>
      </div>
      <div class="exp-trap">
        <div class="exp-lbl lbl-trap"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>落とし穴</div>
        <div class="exp-txt txt-trap" id="expTrap"></div>
      </div>
      <div id="cmpWrap"></div>
      <div class="kws" id="kwWrap"></div>
    </div>
    <div class="actions">
      <button class="btn-ghost" style="font-size:12px" onclick="skipQ()"><i class="ti ti-chevron-right" style="font-size:14px;vertical-align:-1px"></i>スキップ</button>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="streakBadge"></span>
        <button class="btn-p" id="nextBtn" style="display:none" onclick="nextQ()">次の問題 <i class="ti ti-arrow-right" style="font-size:14px;vertical-align:-1px"></i></button>
      </div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-ring">
      <svg width="106" height="106" viewBox="0 0 106 106">
        <circle cx="53" cy="53" r="50" fill="none" stroke="#2D3149" stroke-width="3"/>
        <circle id="resultArc" cx="53" cy="53" r="50" fill="none" stroke="#4F8EF7" stroke-width="3" stroke-linecap="round" stroke-dasharray="0 314"/>
      </svg>
      <div>
        <div class="result-sc" id="resultSc">0/0</div>
        <div class="result-sub" id="resultRate">0%</div>
      </div>
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="domain-grid" id="domainGrid"></div>
    <div class="result-btns">
      <button class="btn-p" onclick="restart()"><i class="ti ti-refresh" style="font-size:14px;vertical-align:-1px;margin-right:4px"></i>もう一度挑戦</button>
    </div>
  </div>
</div>

<script>
const DOMAIN_COLORS={設計:"b-blue",セキュリティ:"b-red",ネットワーク:"b-teal",コスト:"b-green",移行:"b-amber",コンテナ:"b-purple",データ:"b-coral",監視:"b-blue"};
const DIFF_COLORS={Hard:"b-red",Medium:"b-amber",Easy:"b-green"};
const DOMAINS=["全て","設計","セキュリティ","ネットワーク","コスト","移行","コンテナ","データ","監視"];

const QS=[
  {domain:"設計",cat:"HA / DR",diff:"Hard",q:"金融系SaaSでRPO=0、RTO<30秒を求められた。最も費用対効果の高い構成は？",opts:["S3 Cross-Region Replication + CloudFront","Aurora Global Database + Route 53 ARC","DynamoDB Global Tables + Lambda@Edge","RDS Multi-AZ + Read Replica + Route 53フェイルオーバー"],ans:1,why:"Aurora Global Databaseはレプリケーション遅延1秒未満(RPO≈0)、フェイルオーバー1分未満(RTO<1分)を実現。Route 53 ARCはフェイルオーバーの安全なオーケストレーションを提供し、誤操作リスクを排除できます。",trap:"RDS Multi-AZは同一リージョン内のフェイルオーバーのみ。リージョン障害には対応不可。DynamoDB Global TablesはDBレイヤーには適するが、アプリ全体のフェイルオーバーには別途設計が必要。",cmp:[{svc:"Aurora Global DB",feature:"RPO < 1秒",rto:"< 1分",cost:"中",note:"✓ 推奨"},{svc:"RDS Multi-AZ",feature:"RPO 数秒",rto:"1〜2分",cost:"低",note:"単一リージョンのみ"},{svc:"Multi-Site Active",feature:"RPO 0",rto:"秒以下",cost:"高",note:"最高コスト"}],kws:["Aurora Global","Route 53 ARC","RPO/RTO","リージョン障害","フェイルオーバー"]},
  {domain:"セキュリティ",cat:"IAM / SCP",diff:"Hard",q:"Organizationsの全アカウントでS3バケットのパブリック公開を禁止しつつ、セキュリティ監査アカウントのみ例外を許可したい。最適な構成は？",opts:["全OUにSCPで拒否 + 監査アカウントのIAMポリシーで許可","監査アカウントを別OUに移動し、そのOU以外にSCPで拒否","各アカウントのS3ブロックパブリックアクセスを手動設定","Config RulesとSSM AutomationでNon-compliantを自動修復"],ans:1,why:"SCPはOU単位で管理が可能。監査アカウントを別OUに分離し、制限SCPを適用しないことで例外を実現。SCPとIAMの組み合わせでは「明示的Deny > Allow」のためSCPで拒否すると監査OUのIAM許可も上書きされてしまいます。",trap:"選択肢Aの誤り: SCPの明示的DenyはIAMポリシーのAllowを上書きする。Configは検出・修復であり予防的コントロールではない。",cmp:[{svc:"SCP",feature:"予防的・即時強制",rto:"即時",cost:"無料",note:"Denyは最強"},{svc:"IAM Policy",feature:"アカウント内のみ",rto:"アカウント内",cost:"無料",note:"SCPで上書き可"},{svc:"Config Rules",feature:"検出・修復",rto:"修復に時間",cost:"有料",note:"予防不可"}],kws:["SCP","Organizations","明示的Deny","OU分離","予防的コントロール"]},
  {domain:"セキュリティ",cat:"IAM / ロール",diff:"Medium",q:"EC2インスタンスからS3バケットにアクセスさせたい。最もセキュアな認証方法は？",opts:["EC2にIAMユーザーのアクセスキーを環境変数で設定","EC2インスタンスプロファイル(IAMロール)を使用","S3バケットポリシーでEC2のIPを許可","アクセスキーをEC2内のファイルに保存"],ans:1,why:"インスタンスプロファイルはEC2にIAMロールをアタッチし、一時的な認証情報をIMDSv2経由で自動提供する。キーのローテーション不要・漏洩リスクなし・最小権限の原則を守りやすい。AWSのベストプラクティス。",trap:"アクセスキーをEC2に保存すると、インスタンスが侵害された場合に永続的な漏洩リスクになる。環境変数も同様にリスクがある。IPベースのアクセス制御は認証ではなく認可の一部に過ぎない。",cmp:[{svc:"インスタンスプロファイル",feature:"一時認証・自動ローテーション",rto:"ベストプラクティス",cost:"無料",note:"✓ 推奨"},{svc:"アクセスキー(環境変数)",feature:"永続的な認証情報",rto:"漏洩リスク",cost:"無料",note:"非推奨"},{svc:"IPベース許可",feature:"認証ではなく認可",rto:"単独では不十分",cost:"無料",note:"補完的な対策"}],kws:["インスタンスプロファイル","IAMロール","IMDSv2","最小権限","アクセスキー"]},
  {domain:"セキュリティ",cat:"データ保護",diff:"Medium",q:"S3に保存する機密データを暗号化したい。暗号化キーを自社で完全管理し、キーの使用履歴も監査したい。最適な構成は？",opts:["S3マネージド暗号化(SSE-S3)","SSE-KMS(顧客管理キー/CMK)","クライアントサイド暗号化(独自実装)","SSE-KMS(AWSマネージドキー)"],ans:1,why:"SSE-KMSのCMKはキーポリシーで完全なアクセス制御が可能。CloudTrailでKMS APIの呼び出し履歴を記録し監査できる。自動ローテーションも設定可能。AWSマネージドキーと違い顧客がキーを完全管理できる。",trap:"SSE-S3はAWSがキーを管理するため顧客側の制御が限定的。AWSマネージドキー(aws/s3)は顧客がキーポリシーを変更できない。クライアントサイド暗号化は実装・管理の負担が大きい。",cmp:[{svc:"SSE-KMS(CMK)",feature:"完全管理+監査ログ",rto:"CloudTrail連携",cost:"KMS料金あり",note:"✓ 推奨"},{svc:"SSE-S3",feature:"AWSがキー管理",rto:"シンプル",cost:"無料",note:"顧客制御なし"},{svc:"SSE-KMS(AWSマネージド)",feature:"自動管理",rto:"キーポリシー変更不可",cost:"KMS料金あり",note:"制御が限定的"}],kws:["SSE-KMS","CMK","キー管理","S3暗号化","監査ログ"]},
  {domain:"セキュリティ",cat:"ネットワークセキュリティ",diff:"Medium",q:"パブリックサブネットのEC2に対する不正アクセスを多層防御で防ぎたい。正しい防御の組み合わせはどれか？",opts:["セキュリティグループのみ(インバウンドを最小化)","WAF + ALB + セキュリティグループ + ネットワークACL","Shield Advancedのみ","GuardDutyのみ"],ans:1,why:"WAFでL7攻撃(SQLi/XSS)をフィルタリング。ALBでトラフィックを終端しEC2を直接公開しない。セキュリティグループはインスタンスレベルのステートフルフィルタ。NACLはサブネットレベルのステートレスフィルタ。多層防御を実現。",trap:"セキュリティグループのみはL7攻撃に対応できない。Shield AdvancedはDDoS保護で不正アクセス防止ではない。GuardDutyは検出ツールで防御機能ではない。",cmp:[{svc:"WAF+ALB+SG+NACL",feature:"L7〜L3の多層防御",rto:"包括的",cost:"中",note:"✓ 推奨"},{svc:"SG のみ",feature:"L4フィルタ",rto:"シンプル",cost:"無料",note:"L7攻撃に無防備"},{svc:"Shield Advanced",feature:"DDoS保護",rto:"大規模攻撃向け",cost:"高",note:"不正アクセス防止ではない"}],kws:["WAF","セキュリティグループ","NACL","多層防御","ネットワークセキュリティ"]},
  {domain:"セキュリティ",cat:"インシデント対応",diff:"Hard",q:"AWS環境で不審なAPIコール(深夜の大量EC2起動・不審なIAMロール作成)が検出された。原因調査と再発防止のために使うべきサービスの組み合わせは？",opts:["CloudWatch Logs のみ確認","GuardDuty(検出) + CloudTrail(調査) + IAM Access Analyzer(権限確認) + SCPで制限","手動でEC2を停止してS3ログを確認","Security Hub のみ確認"],ans:1,why:"GuardDutyが脅威を検出・アラート。CloudTrailのイベント履歴で誰がいつどのAPIを呼んだか調査。IAM Access Analyzerで想定外のリソース公開や権限を特定。SCPで組織レベルで危険なAPIを制限し再発防止。",trap:"CloudWatch Logsのみではアプリログは見えるがAPI操作履歴はCloudTrailが必要。手動停止は調査前に証拠を消す可能性がある。Security HubはGuardDuty等の統合ダッシュボードで単独では調査できない。",cmp:[{svc:"GuardDuty+CloudTrail+Analyzer",feature:"検出・調査・予防の一連流れ",rto:"包括的",cost:"中",note:"✓ 推奨"},{svc:"CloudWatch Logsのみ",feature:"アプリログ確認",rto:"API履歴が見えない",cost:"低",note:"CloudTrailが別途必要"},{svc:"Security Hub",feature:"統合ダッシュボード",rto:"調査機能なし",cost:"有料",note:"単独では不十分"}],kws:["GuardDuty","CloudTrail","IAM Access Analyzer","インシデント対応","フォレンジック"]},
  {domain:"セキュリティ",cat:"コンプライアンス",diff:"Medium",q:"PCI DSS準拠のために、AWSリソースの設定変更をリアルタイムに検出し、非準拠状態を自動修復したい。最適な構成は？",opts:["CloudTrailのログを手動で定期確認","AWS Config Rules + SSM Automation(自動修復)","Security Hubのみ有効化","GuardDuty + SNS通知"],ans:1,why:"AWS Config RulesがAWSリソースの設定を継続的に評価し、非準拠を検出。SSM AutomationのRemediationアクションと連携することで非準拠状態を自動修復できる。PCI DSS等のコンプライアンス要件の自動化に最適。",trap:"CloudTrail手動確認は非準拠の検出が遅く自動修復もできない。Security Hubは統合可視化ツールで修復機能はない。GuardDutyは脅威検知でコンプライアンス設定の評価は行わない。",cmp:[{svc:"Config Rules+SSM",feature:"継続評価+自動修復",rto:"リアルタイム",cost:"中",note:"✓ 推奨"},{svc:"Security Hub",feature:"統合可視化",rto:"修復機能なし",cost:"有料",note:"Config連携が別途必要"},{svc:"CloudTrail手動",feature:"変更履歴",rto:"事後確認のみ",cost:"低",note:"自動化できない"}],kws:["Config Rules","SSM Automation","自動修復","PCI DSS","コンプライアンス"]},
  {domain:"セキュリティ",cat:"シークレット管理",diff:"Medium",q:"RDSのパスワードをEC2アプリから参照したい。パスワードの自動ローテーションと監査ログも必要。最適なサービスは？",opts:["環境変数にハードコード","AWS Secrets Manager","AWS Systems Manager Parameter Store(SecureString)","S3の暗号化ファイルに保存"],ans:1,why:"Secrets ManagerはRDS・Redshift・DocumentDBのパスワード自動ローテーションをネイティブサポート。アプリはSecretsのARNを指定するだけで最新パスワードを取得できる。CloudTrailで全アクセスが監査される。",trap:"環境変数ハードコードは変更のたびにデプロイが必要でローテーション不可。Parameter Store SecureStringはKMS暗号化に対応するが自動ローテーション機能はない(Lambda実装が必要)。S3保存は管理が煩雑。",cmp:[{svc:"Secrets Manager",feature:"自動ローテーション+監査",rto:"ネイティブRDS連携",cost:"シークレット単価あり",note:"✓ 推奨"},{svc:"Parameter Store",feature:"KMS暗号化",rto:"ローテーションは手動/Lambda",cost:"低/無料",note:"自動ローテーションなし"},{svc:"環境変数",feature:"シンプル",rto:"ローテーション不可",cost:"無料",note:"非推奨"}],kws:["Secrets Manager","自動ローテーション","パスワード管理","RDS","シークレット"]},
  {domain:"セキュリティ",cat:"ゼロトラスト",diff:"Hard",q:"社内ユーザーがインターネット経由でなく、プライベートにAWSマネジメントコンソールにアクセスできるようにしたい。VPN不要で実現する最適な構成は？",opts:["踏み台EC2経由でアクセス","AWS IAM Identity Center + AWS Private Access(VPCエンドポイント)","Direct Connect + Client VPN","CloudFront経由でコンソールにアクセス"],ans:1,why:"AWS Private Accessを使うとVPCエンドポイント経由でAWSコンソールへのプライベートアクセスが可能。IAM Identity Centerと組み合わせてSSOを実現。インターネットを経由せずコンソールにアクセスでき、ゼロトラストアーキテクチャを構成できる。",trap:"踏み台EC2はEC2の管理コストとセキュリティリスクが発生する。Client VPNはVPN管理が必要。CloudFrontはコンソールのプロキシにはならない。",cmp:[{svc:"IAM Identity Center+Private Access",feature:"プライベート+SSO",rto:"VPN不要",cost:"低",note:"✓ 推奨"},{svc:"踏み台EC2",feature:"従来型",rto:"EC2管理が必要",cost:"中",note:"運用負担あり"},{svc:"Client VPN",feature:"VPN接続",rto:"VPN管理が必要",cost:"中",note:"スケールが限定的"}],kws:["AWS Private Access","IAM Identity Center","ゼロトラスト","VPCエンドポイント","プライベートアクセス"]},
  {domain:"セキュリティ",cat:"データ保護",diff:"Hard",q:"マルチリージョン構成でKMSキーを使って暗号化したデータをセカンダリリージョンでも復号したい。最もシンプルな方法は？",opts:["各リージョンに別々のCMKを作成し手動で暗号化を二重に行う","KMSマルチリージョンキーを使用","セカンダリリージョンにキーマテリアルを手動コピー","CloudHSMのクラスタをマルチリージョンに展開"],ans:1,why:"KMSマルチリージョンキー(MRK)はプライマリキーとレプリカキーが同じキーIDを共有し、プライマリで暗号化したデータをレプリカで復号できる。DR構成やグローバルアプリでのシームレスな暗号化を実現。",trap:"別々のCMKを使うと異なるキーで暗号化されたデータは互いに復号できないため、リージョン間でデータを再暗号化する必要がある。キーマテリアルの手動コピーはセキュリティリスクが高い。",cmp:[{svc:"マルチリージョンキー",feature:"同一キーIDで複数リージョン",rto:"シームレスな復号",cost:"KMS料金",note:"✓ 推奨"},{svc:"別々のCMK",feature:"独立したキー管理",rto:"再暗号化が必要",cost:"KMS料金×リージョン数",note:"管理が複雑"},{svc:"CloudHSM",feature:"FIPS L3準拠",rto:"構築コスト高",cost:"高",note:"マルチリージョンMRKより複雑"}],kws:["マルチリージョンキー","KMS","MRK","DR","クロスリージョン暗号化"]},
  {domain:"セキュリティ",cat:"IAM / ロール",diff:"Hard",q:"サードパーティのSaaSツールにAWSリソースへの一時的なアクセスを許可したい。アクセスキーを発行せず、最小権限で実現するには？",opts:["SaaSツール用のIAMユーザーを作成しアクセスキーを発行","クロスアカウントIAMロール + STSのAssumeRole","S3バケットを公開してSaaSがアクセス","IAMユーザーのパスワードをSaaSに共有"],ans:1,why:"クロスアカウントロールはSaaSのAWSアカウントをPrincipalに指定し、STSのAssumeRoleで一時的な認証情報を発行する。Externalidを設定することでconfused deputy攻撃を防止。アクセスキーの永続的な発行が不要。",trap:"アクセスキーの発行は永続的な認証情報で漏洩リスクが高い。S3公開は意図しないデータ漏洩リスクがある。パスワード共有は論外。STSの一時認証情報はデフォルト1時間で自動失効する。",cmp:[{svc:"クロスアカウントロール+STS",feature:"一時認証・External ID",rto:"キー不要",cost:"無料",note:"✓ 推奨"},{svc:"IAMユーザー+アクセスキー",feature:"シンプル",rto:"永続的な認証情報",cost:"無料",note:"漏洩リスク高"},{svc:"S3公開",feature:"手軽",rto:"データ漏洩リスク",cost:"無料",note:"最小権限に反する"}],kws:["クロスアカウントロール","AssumeRole","External ID","STS","一時認証情報"]},
  {domain:"セキュリティ",cat:"ログ・監査",diff:"Medium",q:"CloudTrailのログが改ざんされていないことを証明したい。また、ログを誰も削除できないようにしたい。最適な構成は？",opts:["S3のバージョニングを有効化するだけ","CloudTrailログファイル検証 + S3 Object Lock(Compliance Mode) + MFA Delete","CloudTrailログをRDSにコピー","S3のサーバー側暗号化を有効化"],ans:1,why:"CloudTrailのログファイル検証機能はSHA-256ハッシュとデジタル署名でログの改ざんを検出できる。S3 Object LockのCompliance Modeは保持期間中はルートを含む誰も削除・変更できない。MFA Deleteでさらに削除を防止。",trap:"バージョニングのみでは削除は防げない(バージョンごと削除可能)。RDSへのコピーはRDS自体が改ざんのリスクになる。暗号化は改ざん検出ではなく機密性の保護。",cmp:[{svc:"ログ検証+Object Lock",feature:"改ざん検出+削除防止",rto:"監査証跡の完全性",cost:"低",note:"✓ 推奨"},{svc:"S3バージョニング",feature:"削除の取り消し",rto:"バージョンごと削除可",cost:"低",note:"完全な削除防止にならない"},{svc:"SSE暗号化",feature:"機密性の保護",rto:"改ざん検出ではない",cost:"低",note:"目的が異なる"}],kws:["CloudTrail","ログファイル検証","S3 Object Lock","MFA Delete","改ざん防止"]},
  {domain:"セキュリティ",cat:"コンテナセキュリティ",diff:"Hard",q:"ECSコンテナで実行するアプリにDBパスワードを安全に渡したい。コンテナイメージにシークレットを含めず、実行時に動的に注入するベストな方法は？",opts:["Dockerfileにパスワードを環境変数でハードコード","ECSタスク定義でSecrets ManagerまたはParameter StoreのARNを参照","S3から起動スクリプトでパスワードを取得","ALBのヘッダーでパスワードを転送"],ans:1,why:"ECSタスク定義のsecretsフィールドでSecrets ManagerのARNを指定すると、ECSがコンテナ起動時に自動的にシークレットを取得して環境変数として注入する。コンテナイメージにシークレットが含まれず、ローテーションにも対応。",trap:"Dockerfileへのハードコードはイメージを取得できる人全員がパスワードを参照できる。S3からの取得はアプリコードの実装が必要で複雑。ALBヘッダーはHTTPログに残るリスクがある。",cmp:[{svc:"ECSタスク定義+Secrets Manager",feature:"動的注入・ローテーション対応",rto:"コンテナ起動時に自動取得",cost:"Secrets Manager料金",note:"✓ 推奨"},{svc:"Dockerfileハードコード",feature:"シンプル",rto:"イメージ内に平文",cost:"無料",note:"セキュリティリスク大"},{svc:"S3からスクリプト取得",feature:"柔軟",rto:"実装コストあり",cost:"低",note:"エラーハンドリングが複雑"}],kws:["ECS","Secrets Manager","シークレット注入","コンテナセキュリティ","タスク定義"]},
  {domain:"ネットワーク",cat:"接続設計",diff:"Medium",q:"オンプレミスとAWSを専用線で接続し、将来的に10以上のVPCを追加予定。Direct Connectの接続方式として最もスケーラブルな選択は？",opts:["各VPCに個別のPrivate VIFを作成","Direct Connect Gateway + Transit Gateway","VPN CloudHub構成","Direct Connect + VPCピアリングのフルメッシュ"],ans:1,why:"Direct Connect Gatewayは1つのDX接続から最大10リージョンのVPCへ接続可能。Transit Gatewayと組み合わせるとハブ&スポーク型で数百VPCまでスケール。",trap:"Private VIF方式はVPCごとに個別設定が必要で、10VPC以上では管理が煩雑。フルメッシュVPCピアリングはn*(n-1)/2の接続数が必要で推移的ルーティング不可。",cmp:[{svc:"Private VIF",feature:"1 VIF = 1 VPC",rto:"拡張性: 低",cost:"低",note:"小規模のみ"},{svc:"DX GW + TGW",feature:"1接続→数百VPC",rto:"拡張性: 高",cost:"中",note:"✓ 推奨"},{svc:"VPCピアリング",feature:"推移的ルーティング不可",rto:"拡張性: 低",cost:"低",note:"フルメッシュ"}],kws:["Direct Connect Gateway","Transit Gateway","VIF","ハブ&スポーク","スケーラビリティ"]},
  {domain:"ネットワーク",cat:"VPC設計",diff:"Medium",q:"プライベートサブネットのEC2インスタンスからインターネット上のパッケージをダウンロードしたい。最もコスト効率が高い構成は？",opts:["EC2にパブリックIPを付与してIGWを使う","パブリックサブネットにNATゲートウェイを配置","プライベートサブネットにNATゲートウェイを配置","VPCエンドポイント経由でS3からダウンロード"],ans:1,why:"NATゲートウェイはパブリックサブネットに配置し、プライベートサブネットのEC2からのアウトバウンドトラフィックをインターネットに転送する。プライベートサブネットのEC2はインバウンドを受け付けず、アウトバウンドのみ許可するセキュアな構成。",trap:"EC2にパブリックIPを付与するとインバウンドのリスクが生じる。NATゲートウェイはパブリックサブネットに配置する必要がある。S3専用にはVPCエンドポイントが最適だが汎用インターネットアクセスにはNATが必要。",cmp:[{svc:"NATゲートウェイ",feature:"アウトバウンドのみ許可",rto:"フルマネージド",cost:"時間+データ転送料",note:"✓ 推奨"},{svc:"NAT インスタンス",feature:"カスタマイズ可能",rto:"EC2管理が必要",cost:"低",note:"管理負担あり"},{svc:"パブリックIP付与",feature:"シンプル",rto:"インバウンドリスク",cost:"低",note:"セキュリティリスク"}],kws:["NATゲートウェイ","プライベートサブネット","IGW","VPC","アウトバウンド"]},
  {domain:"ネットワーク",cat:"VPC設計",diff:"Hard",q:"2つのVPC(VPC-A: 10.0.0.0/16、VPC-B: 10.1.0.0/16)をピアリング接続し、VPC-AのEC2からVPC-BのRDSにアクセスしたい。必要な設定を全て含む選択肢はどれか？",opts:["VPCピアリング接続を作成するだけ","VPCピアリング接続 + 両VPCのルートテーブルに相手VPCのCIDRを追加 + セキュリティグループでポートを許可","VPCピアリング接続 + IGWを追加","VPCピアリング接続 + NATゲートウェイを追加"],ans:1,why:"VPCピアリングは接続を作成するだけでは通信できない。両VPCのルートテーブルに相手VPCへのルートを追加し、RDS側のセキュリティグループでEC2からの接続ポートを許可する必要がある。この3つが揃って初めて通信可能。",trap:"ピアリング接続の作成だけでは通信できない。IGWもNATも不要でピアリングはプライベート通信。CIDRが重複する場合はピアリング不可(本問は重複なし)。",cmp:[{svc:"ピアリング+ルート+SG",feature:"3つ全て必要",rto:"必須設定",cost:"低",note:"✓ 正解"},{svc:"ピアリングのみ",feature:"接続作成のみ",rto:"通信できない",cost:"低",note:"ルート設定が必要"},{svc:"TGW経由",feature:"多数VPC向け",rto:"2VPCにはオーバースペック",cost:"中",note:"2VPCならピアリングで十分"}],kws:["VPCピアリング","ルートテーブル","セキュリティグループ","CIDR","プライベート通信"]},
  {domain:"ネットワーク",cat:"DNS",diff:"Medium",q:"VPC内のEC2からオンプレミスのDNSサーバー(example.internal)を名前解決したい。また、オンプレからAWSのプライベートホストゾーン(aws.internal)も解決したい。最適な構成は？",opts:["EC2のresolv.confを手動編集","Route 53 Resolver インバウンド/アウトバウンドエンドポイント","VPCのDHCPオプションセットでDNSサーバーをオンプレに変更","Route 53パブリックホストゾーンを使用"],ans:1,why:"Route 53 ResolverのアウトバウンドエンドポイントでAWSからオンプレDNSへの転送ルールを設定。インバウンドエンドポイントでオンプレからAWSプライベートホストゾーンを解決できる。双方向のDNS解決をマネージドで実現。",trap:"resolv.conf手動編集はEC2再起動で設定がリセットされる。DHCPオプションセットを変更するとVPC全体のDNSが変わりAWSサービスの解決に影響する。パブリックホストゾーンはプライベートIPの名前解決に適さない。",cmp:[{svc:"Route 53 Resolver",feature:"双方向DNS解決",rto:"マネージド",cost:"低",note:"✓ 推奨"},{svc:"DHCPオプション変更",feature:"VPC全体に影響",rto:"AWSサービス解決に影響リスク",cost:"無料",note:"副作用あり"},{svc:"resolv.conf手動",feature:"個別設定",rto:"再起動でリセット",cost:"無料",note:"管理が困難"}],kws:["Route 53 Resolver","インバウンドエンドポイント","アウトバウンドエンドポイント","ハイブリッドDNS","転送ルール"]},
  {domain:"ネットワーク",cat:"セキュリティ",diff:"Medium",q:"EC2インスタンスをインターネットから完全に隔離しつつ、Systems Manager Session ManagerでリモートアクセスしたいとSSMエージェントからAWSエンドポイントへの通信を確保したい。最適な構成は？",opts:["パブリックサブネットに移動してSSM接続","NATゲートウェイ経由でSSMエンドポイントに接続","VPCエンドポイント(ssm/ssmmessages/ec2messages)をプライベートサブネットに作成","踏み台EC2経由でSSH接続"],ans:2,why:"SSM Session ManagerはSSM・SSMMessages・EC2Messagesの3つのVPCエンドポイントが必要。これらをプライベートサブネットに作成することで、EC2はインターネットなし・踏み台なしでSession Managerによるリモートアクセスが可能。",trap:"パブリックサブネットへの移動はインターネット露出になる。NATゲートウェイはデータ転送コストが発生し、完全隔離にならない場合もある。踏み台EC2はSSHポートの管理が必要で追加コストもかかる。",cmp:[{svc:"VPCエンドポイント3つ",feature:"完全プライベート",rto:"インターネット不要",cost:"エンドポイント料金",note:"✓ 推奨"},{svc:"NATゲートウェイ",feature:"インターネット経由",rto:"完全隔離ではない",cost:"転送料あり",note:"隔離要件に合わない"},{svc:"踏み台EC2",feature:"従来型",rto:"EC2管理コスト",cost:"中",note:"Session Managerより劣る"}],kws:["Session Manager","VPCエンドポイント","プライベートサブネット","踏み台不要","ssmmessages"]},
  {domain:"ネットワーク",cat:"ロードバランシング",diff:"Medium",q:"WebSocketを使ったリアルタイムチャットアプリをAWSで構築したい。最適なロードバランサーの選択は？",opts:["Classic Load Balancer","Network Load Balancer","Application Load Balancer","Route 53のレイテンシーベースルーティング"],ans:2,why:"ALBはWebSocketとHTTP/2をネイティブサポート。リクエストレベルでのルーティング(パス・ホスト・ヘッダーベース)が可能で、WebSocketのロングコネクションも維持できる。ECSやLambdaとの統合も容易。",trap:"CLBはレガシーで現在は非推奨。NLBはL4(TCP/UDP)でWebSocket自体は通るがHTTPルーティング機能がない。Route 53はDNSレベルのルーティングでロードバランシングではない。",cmp:[{svc:"ALB",feature:"WebSocket+HTTP/2対応",rto:"L7ルーティング",cost:"低",note:"✓ 推奨"},{svc:"NLB",feature:"超高性能・静的IP",rto:"L4のみ",cost:"低",note:"HTTPルーティング不可"},{svc:"CLB",feature:"レガシー",rto:"機能が限定的",cost:"低",note:"新規利用非推奨"}],kws:["ALB","WebSocket","HTTP/2","ロードバランサー","リアルタイム通信"]},
  {domain:"ネットワーク",cat:"グローバル配信",diff:"Medium",q:"静的Webサイト(S3ホスティング)をグローバルに低レイテンシーで配信したい。また特定国からのアクセスをブロックしたい。最適な構成は？",opts:["S3の静的ウェブサイトホスティングのみ","CloudFront + S3オリジン + WAF(地理的制限)","Route 53レイテンシーベースルーティング + S3","Global Accelerator + S3"],ans:1,why:"CloudFrontはS3をオリジンとしてエッジロケーションにコンテンツをキャッシュしグローバルな低レイテンシー配信を実現。WAFの地理的一致条件で特定国からのアクセスをブロックできる。HTTPSも簡単に設定可能。",trap:"S3のみではエッジキャッシュがなくグローバルアクセスは遅い。Route 53レイテンシーベースは複数リージョンのS3が必要で複雑。Global AcceleratorはHTTPコンテンツのキャッシュ機能がない。",cmp:[{svc:"CloudFront+WAF",feature:"エッジキャッシュ+地理制限",rto:"グローバル低レイテンシー",cost:"低",note:"✓ 推奨"},{svc:"S3のみ",feature:"シンプル",rto:"エッジなし",cost:"最低",note:"グローバル配信に不向き"},{svc:"Global Accelerator",feature:"TCP/UDP最適化",rto:"キャッシュなし",cost:"中",note:"静的サイトにはCloudFrontが最適"}],kws:["CloudFront","WAF","地理的制限","S3","エッジキャッシュ"]},
  {domain:"ネットワーク",cat:"ハイブリッド接続",diff:"Hard",q:"Direct Connect回線が障害でダウンした場合に、自動的にVPN接続にフェイルオーバーして通信を継続したい。最適な構成は？",opts:["DXとVPNを別々に管理し手動で切り替え","DX + Site-to-Site VPN(バックアップ)をTransit GatewayにアタッチしBGPフェイルオーバー","DX回線を2本引いて冗長化","CloudWatchアラームでLambdaが自動切り替え"],ans:1,why:"Transit GatewayにDXとVPNの両方をアタッチし、BGPのルートアドバタイズを設定。DXはより低いBGP MED値を設定して優先、DX障害時はBGPルートが自動的にVPN経由に切り替わる。自動フェイルオーバーが実現できる。",trap:"手動切り替えは障害発生〜対応までのダウンタイムが発生する。DX2本冗長化はAWS側・キャリア側どちらかの共通障害には対応できない。Lambdaによる切り替えはBGPより遅く複雑。",cmp:[{svc:"TGW+DX+VPN+BGP",feature:"自動フェイルオーバー",rto:"BGP収束時間(秒〜分)",cost:"中",note:"✓ 推奨"},{svc:"DX冗長化",feature:"高可用性",rto:"共通障害に弱い",cost:"高(2回線分)",note:"VPNバックアップの方が安価"},{svc:"手動切り替え",feature:"シンプル",rto:"ダウンタイムあり",cost:"低",note:"24h対応が必要"}],kws:["Direct Connect","Site-to-Site VPN","BGP","フェイルオーバー","Transit Gateway"]},
  {domain:"ネットワーク",cat:"VPC設計",diff:"Hard",q:"サービスプロバイダーがVPC内のサービスを、別アカウントの複数のコンシューマーVPCにプライベートに提供したい。各コンシューマーのVPC CIDRが重複している可能性がある。最適な構成は？",opts:["VPCピアリングで全コンシューマーと接続","AWS PrivateLink(VPCエンドポイントサービス)を使用","Transit Gatewayで全VPCを接続","Direct ConnectでオンプレとAWSを接続"],ans:1,why:"PrivateLinkはNLBをフロントエンドにしてエンドポイントサービスを作成。コンシューマーはInterface型VPCエンドポイントを作成するだけでサービスにアクセスできる。VPC CIDRの重複に関係なく動作し、推移的ルーティング不要。",trap:"VPCピアリングはCIDRが重複するVPCとは接続できない。Transit GatewayもCIDR重複時はルーティングが複雑になる。Direct ConnectはオンプレとAWSの接続でVPC間通信には使わない。",cmp:[{svc:"PrivateLink",feature:"CIDR重複OK・推移的不要",rto:"スケーラブル",cost:"中",note:"✓ 推奨"},{svc:"VPCピアリング",feature:"シンプル",rto:"CIDR重複不可",cost:"低",note:"CIDRが重複すると使えない"},{svc:"Transit Gateway",feature:"ハブ&スポーク",rto:"CIDR重複で複雑",cost:"中",note:"CIDRが重複すると困難"}],kws:["PrivateLink","VPCエンドポイントサービス","CIDR重複","クロスアカウント","NLB"]},
  {domain:"ネットワーク",cat:"パフォーマンス",diff:"Medium",q:"EC2インスタンス間の通信を最大スループットで行いたい。同一AZ内でのネットワーク帯域を最大化する最適な選択は？",opts:["より大きなインスタンスタイプに変更","クラスタープレイスメントグループを使用","ENA(Elastic Network Adapter)を有効化","専用ホスト(Dedicated Host)を使用"],ans:1,why:"クラスタープレイスメントグループは同一AZ内の物理的に近いハードウェアにインスタンスを配置し、インスタンス間の低レイテンシー・高スループット(最大100Gbps)通信を実現。HPC・機械学習などのワークロードに最適。",trap:"インスタンスタイプ変更はそのインスタンス自体の帯域は上がるがインスタンス間通信の最適化にはならない。ENAは高速ネットワーキングの有効化で必要条件だが、プレイスメントグループと組み合わせて最大効果を発揮。Dedicated Hostはライセンス管理用途。",cmp:[{svc:"クラスタープレイスメントG",feature:"物理的近接配置",rto:"最大100Gbps",cost:"追加費用なし",note:"✓ 推奨"},{svc:"ENAのみ",feature:"高速NIC",rto:"帯域向上",cost:"追加費用なし",note:"プレイスメントGとの組み合わせが最適"},{svc:"Dedicated Host",feature:"物理専有",rto:"近接保証なし",cost:"高",note:"ライセンス管理が主目的"}],kws:["プレイスメントグループ","クラスター","ENA","低レイテンシー","HPC"]},
  {domain:"ネットワーク",cat:"IPv6",diff:"Medium",q:"VPC内のEC2にIPv6アドレスを付与し、インターネットへのアウトバウンド通信のみ許可したい。インバウンドのIPv6通信は禁止。最適な構成は？",opts:["IPv6のIGWを設定してセキュリティグループでインバウンドを拒否","Egress-Only Internet Gateway(EIGW)を使用","NATゲートウェイにIPv6を設定","IPv4のNATゲートウェイをIPv6でも使用"],ans:1,why:"Egress-Only Internet GatewayはIPv6専用のゲートウェイで、アウトバウンドのIPv6通信のみを許可し、インターネットからのインバウンドを拒否する。NATゲートウェイのIPv6版に相当する機能を提供する。",trap:"通常のIGWはIPv6の双方向通信を許可してしまう。セキュリティグループでのフィルタリングより設計段階でEIGWを使う方が確実。NATゲートウェイはIPv4専用でIPv6には対応していない。",cmp:[{svc:"Egress-Only IGW",feature:"IPv6アウトバウンドのみ",rto:"インバウンド完全遮断",cost:"無料",note:"✓ 推奨"},{svc:"IGW+SG制限",feature:"設定で制御",rto:"設定ミスのリスク",cost:"無料",note:"EIGWの方が確実"},{svc:"NATゲートウェイ",feature:"IPv4専用",rto:"IPv6非対応",cost:"有料",note:"IPv6には使えない"}],kws:["Egress-Only Internet Gateway","IPv6","アウトバウンド","EIGW","VPC"]},
  {domain:"ネットワーク",cat:"コスト最適化",diff:"Medium",q:"同一リージョン内でEC2からS3への大量データ転送が発生している。NATゲートウェイのデータ転送コストを削減したい。最適な対策は？",opts:["NATゲートウェイを削除してパブリックIPをEC2に付与","S3 Gateway型VPCエンドポイントを作成してルートテーブルに追加","CloudFrontを経由してS3にアクセス","S3をEC2と同一AZに変更"],ans:1,why:"S3 Gateway型VPCエンドポイントは無料で作成でき、VPC内からS3へのトラフィックをAWSバックボーンネットワーク経由に変更する。NATゲートウェイを経由しなくなるためデータ転送料が削減できる。S3とDynamoDBのみGateway型が利用可能。",trap:"パブリックIPを付与するとセキュリティリスクが増大しコスト削減効果より問題が大きい。CloudFront経由はさらにコストがかかる。S3はリージョンサービスなのでAZによる料金差はない。",cmp:[{svc:"S3 Gateway Endpoint",feature:"NATバイパス・無料",rto:"設定のみ",cost:"無料",note:"✓ 推奨"},{svc:"パブリックIP付与",feature:"NATが不要に",rto:"セキュリティリスク",cost:"低",note:"セキュリティが問題"},{svc:"Interface Endpoint",feature:"PrivateLink経由",rto:"有料",cost:"有料",note:"GatewayタイプのS3には不要"}],kws:["S3 Gateway Endpoint","NATゲートウェイ","コスト削減","VPCエンドポイント","データ転送料"]},
  {domain:"コスト",cat:"コスト最適化",diff:"Medium",q:"本番環境(24時間稼働)・ステージング(平日9-18時のみ)・バッチ処理(中断可)の3種EC2ワークロードに最適な購入オプションの組み合わせは？",opts:["全てOn-Demand","本番:Reserved / ステージング:On-Demand / バッチ:Spot","本番:Dedicated Host / ステージング:Reserved / バッチ:On-Demand","本番:Savings Plans / ステージング:Reserved / バッチ:On-Demand"],ans:1,why:"本番(24h稼働)はReserved Instancesで最大72%割引。ステージング(稼働率≈40%)はOn-Demandが経済的。バッチ(中断可)はSpot Instancesで最大90%割引。",trap:"Dedicated Hostは物理ホスト占有が必要なライセンス持込み(BYOL)用途向けで、コスト最適化が目的では非推奨。",cmp:[{svc:"Reserved (1yr)",feature:"最大72%割引",rto:"1年コミット",cost:"低",note:"24h稼働向け"},{svc:"Spot",feature:"最大90%割引",rto:"中断リスクあり",cost:"最低",note:"耐障害バッチ向け"},{svc:"Savings Plans",feature:"最大66%割引",rto:"柔軟",cost:"低〜中",note:"ファミリー変更可"}],kws:["Reserved Instances","Spot Instance","Savings Plans","稼働率","コミットメント"]},
  {domain:"コスト",cat:"ストレージコスト",diff:"Medium",q:"S3に保存されるログファイルは最初の30日は頻繁にアクセスされるが、その後はほぼアクセスされない。1年後に削除したい。最もコスト効率の高いLifecycleポリシーは？",opts:["全期間S3 Standardで保存","S3 Standard → 30日後にS3 Standard-IA → 90日後にS3 Glacier Flexible → 365日後に削除","S3 Standard → 1日後にS3 Glacier Deep Archive","S3 Intelligent-Tieringを使用"],ans:1,why:"アクセスパターンが明確なのでLifecycleポリシーが最適。Standard-IAは30日以上保存でコスト削減(取得費用が発生するが低頻度なら安い)。Glacierでさらに削減し、365日で自動削除。Intelligent-Tieringはパターン不明時に有効だが監視コストがかかる。",trap:"全期間Standardは最もコスト高。1日後にDeep Archiveは取り出し時間が12時間以上かかり運用上問題。Intelligent-Tieringはアクセスパターンが明確な場合はLifecycleより割高になることがある。",cmp:[{svc:"Lifecycle(Standard→IA→Glacier)",feature:"段階的コスト削減",rto:"自動移行",cost:"最安",note:"✓ 推奨"},{svc:"全期間Standard",feature:"即時アクセス",rto:"アクセス容易",cost:"最高",note:"明らかに非効率"},{svc:"Intelligent-Tiering",feature:"自動最適化",rto:"監視コストあり",cost:"中",note:"パターン明確なら不要"}],kws:["S3 Lifecycle","Standard-IA","Glacier","ストレージクラス","コスト最適化"]},
  {domain:"コスト",cat:"コンピューティングコスト",diff:"Hard",q:"機械学習のトレーニングジョブ(1回あたり6時間・週3回実行・中断可)に最もコスト効率の高いEC2購入オプションは？また中断時の対策も含めた最適な構成は？",opts:["オンデマンドインスタンスで実行","Spot Instance + チェックポイント保存(S3) + Spot中断ハンドラー","Reserved Instance(1年)","Dedicated Host"],ans:1,why:"Spot Instancesは最大90%割引で週3回のバッチに最適。MLフレームワーク(TensorFlow/PyTorch)のチェックポイント機能でS3に進捗を保存し、中断後に再開可能。Spot中断通知(2分前)を受けてチェックポイントを保存する。",trap:"オンデマンドは割引なし。Reserved Instancesは1年コミットで週3回のジョブには稼働率が低く非効率。Dedicated Hostはライセンス管理用途でコスト削減にならない。",cmp:[{svc:"Spot+チェックポイント",feature:"最大90%割引・中断対応",rto:"中断から再開可能",cost:"最低",note:"✓ 推奨"},{svc:"オンデマンド",feature:"中断なし・確実",rto:"安定",cost:"高",note:"割引なし"},{svc:"Reserved",feature:"最大72%割引",rto:"1年コミット",cost:"低",note:"週3回では稼働率が低い"}],kws:["Spot Instance","チェックポイント","機械学習","中断ハンドラー","コスト最適化"]},
  {domain:"コスト",cat:"データ転送コスト",diff:"Medium",q:"AWSのデータ転送コストを削減したい。次のうちデータ転送料が無料になる組み合わせはどれか？",opts:["EC2からインターネットへのアウトバウンド","同一AZ内のEC2インスタンス間通信(プライベートIP使用)","異なるAZ間のEC2通信","EC2からS3へのアウトバウンド(NATゲートウェイ経由)"],ans:1,why:"同一AZ内でプライベートIPを使ったEC2間通信はデータ転送料が無料。インターネットへのアウトバウンドは課金対象。異なるAZ間はAZ間転送料が発生。NATゲートウェイ経由はNATのデータ処理料が発生する。",trap:"パブリックIPを使った同一AZ内通信でも一度外に出るため課金される。異なるAZ間通信は同一リージョンでも課金対象(約$0.01/GB)。S3 GatewayエンドポイントはNATを避けてコスト削減に有効。",cmp:[{svc:"同一AZ内(プライベートIP)",feature:"無料",rto:"最低レイテンシー",cost:"無料",note:"✓ 無料"},{svc:"異なるAZ間",feature:"高可用性",rto:"AZ間遅延あり",cost:"約$0.01/GB",note:"可用性とコストのトレードオフ"},{svc:"インターネットアウトバウンド",feature:"外部連携",rto:"帯域に依存",cost:"約$0.09/GB〜",note:"最もコスト高"}],kws:["データ転送料","同一AZ","プライベートIP","無料枠","転送コスト"]},
  {domain:"コスト",cat:"データベースコスト",diff:"Medium",q:"開発・テスト環境のRDSインスタンスを平日9-17時のみ稼働させてコストを削減したい。最も簡単に自動化する方法は？",opts:["手動でRDSを起動・停止する","EventBridge(CloudWatch Events) + Lambda でRDSを自動起動・停止","RDSをAurora Serverlessに変更","RDSをS3にデータをエクスポートして削除"],ans:1,why:"EventBridgeのcronスケジュールでLambdaを起動し、AWS SDKのstart-db-instance/stop-db-instanceを呼び出すことで平日9時起動・17時停止を自動化できる。稼働時間を週40時間(約24%)に削減し、コストを大幅に削減できる。",trap:"手動は忘れるリスクがあり自動化のメリットがない。Aurora Serverlessは接続がない場合に自動停止するが開発環境への適用は設定が複雑。S3エクスポート後削除はデータ復元に時間がかかる。",cmp:[{svc:"EventBridge+Lambda",feature:"自動スケジュール起動/停止",rto:"設定のみ",cost:"Lambda実行コストのみ",note:"✓ 推奨"},{svc:"手動起動/停止",feature:"シンプル",rto:"忘れるリスク",cost:"無料",note:"自動化できない"},{svc:"Aurora Serverless",feature:"自動スケール",cost:"中",rto:"設定が複雑",note:"開発環境には過剰な場合も"}],kws:["EventBridge","Lambda","RDS起動停止","開発環境","スケジュール自動化"]},
  {domain:"コスト",cat:"コスト可視化",diff:"Medium",q:"マルチアカウント環境で部門ごとのAWSコストを把握し、月次レポートを自動生成したい。最適な構成は？",opts:["各アカウントのマネジメントコンソールで手動確認","AWS Cost Explorer + コスト配分タグ + AWS Budgets(アラート) + Cost and Usage Report(S3)","CloudWatchメトリクスでコストを監視","各アカウントにコスト確認用IAMユーザーを作成"],ans:1,why:"Cost Explorerでコストの可視化・分析。コスト配分タグで部門・プロジェクト別に集計。AWS BudgetsでコストやUsageの閾値超過をアラート。CURをS3に出力してAthenaやQuickSightで月次レポートを自動生成できる。",trap:"手動確認はスケールしない。CloudWatchはインフラメトリクス向けでコスト分析には不向き。IAMユーザー作成だけではレポートの自動化にならない。",cmp:[{svc:"Cost Explorer+タグ+Budgets",feature:"可視化・アラート・レポート",rto:"自動化",cost:"無料〜低",note:"✓ 推奨"},{svc:"CloudWatch",feature:"インフラメトリクス",rto:"コスト分析に不向き",cost:"低",note:"目的が異なる"},{svc:"手動確認",feature:"シンプル",rto:"スケールしない",cost:"無料",note:"自動化できない"}],kws:["Cost Explorer","コスト配分タグ","AWS Budgets","CUR","コスト可視化"]},
  {domain:"コスト",cat:"サーバーレスコスト",diff:"Medium",q:"Lambda関数が月間1億回実行され、1回あたり平均200msかかる。コストを削減するために最初に確認すべき項目は？",opts:["Lambdaを廃止してEC2に移行","メモリ割り当てを最適化(Lambda Power Tuning)","リージョンを変更して単価を下げる","同時実行数を制限する"],ans:1,why:"Lambdaのコストはリクエスト数×実行時間×メモリ量で決まる。メモリを増やすと実行時間が短縮される場合があり、トータルコストが下がることがある。Lambda Power Tuningツールで最適なメモリ設定を自動で見つけられる。",trap:"EC2移行はサーバーレスのメリットを失い管理コストが増加する。リージョン変更はデータ転送コストや他サービスとの整合性問題が発生する。同時実行数制限はスロットリングを起こしパフォーマンスが低下する。",cmp:[{svc:"Power Tuning(メモリ最適化)",feature:"実行時間短縮でコスト削減",rto:"ツールで自動最適化",cost:"無料",note:"✓ 最初に確認"},{svc:"EC2移行",feature:"長時間処理に向く",rto:"管理コスト増加",cost:"固定費",note:"サーバーレスのメリット消失"},{svc:"同時実行数制限",feature:"コスト上限設定",rto:"スロットリング発生",cost:"制限はできる",note:"パフォーマンス影響あり"}],kws:["Lambda","Power Tuning","メモリ最適化","コスト削減","実行時間"]},
  {domain:"コスト",cat:"ストレージコスト",diff:"Medium",q:"大量のEC2 EBSボリュームがある。スナップショットが増え続けてS3コストが増大している。コストを削減する方法として最も効果的なのは？",opts:["全スナップショットを手動削除","Amazon Data Lifecycle Manager(DLM)でスナップショットの自動作成・自動削除ポリシーを設定","EBSボリュームを全てgp2からgp3に変更","スナップショットを別リージョンにコピー"],ans:1,why:"DLMはEBSスナップショットのライフサイクルを自動管理。保持数や保持期間を設定し古いスナップショットを自動削除することでS3コストを削減。バックアップポリシーとして世代管理も同時に実現できる。",trap:"手動削除は管理が煩雑で新しいスナップショットが増え続けるとすぐ元に戻る。gp2→gp3はEBSボリューム自体のコスト削減でスナップショットコストとは別。別リージョンコピーはコストが増える。",cmp:[{svc:"DLM",feature:"自動作成・世代管理・削除",rto:"ポリシーベース",cost:"DLM無料(スナップショット料金のみ)",note:"✓ 推奨"},{svc:"手動削除",feature:"即時削減",rto:"継続的管理が必要",cost:"無料",note:"自動化できない"},{svc:"gp2→gp3",feature:"EBSコスト削減",rto:"パフォーマンス向上も",cost:"20%削減",note:"スナップショットコストとは別"}],kws:["DLM","EBSスナップショット","ライフサイクル管理","自動削除","ストレージコスト"]},
  {domain:"コスト",cat:"コンピューティングコスト",diff:"Hard",q:"本番Webアプリのベースロード(常時稼働)が20台、ピーク時は最大80台必要。コストを最小化する購入オプションの組み合わせは？",opts:["80台全てOn-Demand","20台Reserved + 60台Spot","20台Reserved + 60台On-Demand","80台Reserved(3年)"],ans:1,why:"ベースロードの20台はReserved(1年)で最大72%割引。ピーク時の追加60台はSpot Instanceで最大90%割引。Webアプリのステートレスな追加インスタンスは中断しても影響が小さく、ElastiCacheやALBとの組み合わせでSpotに適している。",trap:"全On-Demandは最もコスト高。60台On-Demandはスパイク時の柔軟性はあるがSpotより高い。80台全Reserved(3年)はピーク時のみ必要なインスタンスに3年コミットするのは非効率。",cmp:[{svc:"Reserved(20)+Spot(60)",feature:"ベース固定+スパイク安価",rto:"最大コスト削減",cost:"最低",note:"✓ 推奨"},{svc:"Reserved(20)+On-Demand(60)",feature:"安定性重視",rto:"確実",cost:"中",note:"Spotより高コスト"},{svc:"全On-Demand",feature:"シンプル",rto:"最大の柔軟性",cost:"最高",note:"コスト非効率"}],kws:["Reserved Instances","Spot Instance","ベースロード","ピーク対応","組み合わせ最適化"]},
  {domain:"コスト",cat:"ネットワークコスト",diff:"Medium",q:"CloudFrontのオリジンとしてALB+EC2を使っている。CloudFrontとオリジン間のデータ転送コストを削減したい。最も効果的な方法は？",opts:["オリジンをS3に変更する","CloudFront Origin Shield を有効化","CloudFrontのキャッシュTTLを短くする","ALBをNLBに変更する"],ans:1,why:"Origin Shieldは追加のキャッシュレイヤーとして機能し、オリジンへのリクエストを集約・削減する。エッジロケーションからOrigin Shieldを経由してオリジンへのリクエスト数が減少し、オリジン転送コストとオリジンの負荷を同時に削減できる。",trap:"S3変更は動的コンテンツには対応できない。TTLを短くするとキャッシュヒット率が下がりオリジンへのリクエストが増えてコストが上昇する。ALB→NLBはHTTPルーティング機能が失われる。",cmp:[{svc:"Origin Shield",feature:"キャッシュ集約・オリジン削減",rto:"追加レイヤー",cost:"Origin Shield料金あり(転送削減で相殺)",note:"✓ 推奨"},{svc:"TTL短縮",feature:"新鮮なコンテンツ",rto:"キャッシュヒット率低下",cost:"コスト増加",note:"逆効果"},{svc:"S3変更",feature:"静的コンテンツに最適",rto:"動的コンテンツ非対応",cost:"低",note:"用途が限定的"}],kws:["CloudFront","Origin Shield","キャッシュ","オリジン転送","コスト削減"]},
  {domain:"コスト",cat:"データベースコスト",diff:"Hard",q:"DynamoDBのコストが急増している。テーブルを分析したところ、読み取りの90%が同じホットキーへのアクセスだった。コストを削減しながらパフォーマンスも維持する方法は？",opts:["DynamoDBをRDSに移行","DynamoDB DAXクラスターを追加","DynamoDBのプロビジョンドキャパシティを増やす","テーブルをオンデマンドキャパシティに変更"],ans:1,why:"DAX(DynamoDB Accelerator)はインメモリキャッシュでホットキーへの繰り返しアクセスをキャッシュから返す。DynamoDB本体へのReadCapacityUnitの消費を大幅に削減しコストを下げながら、マイクロ秒レスポンスでパフォーマンスも向上する。",trap:"RDS移行はDynamoDBの設計を根本から変える大工事。プロビジョンドキャパシティ増加はコスト増加につながる。オンデマンドキャパシティはホットキー問題を解決せず、むしろコストが増える場合がある。",cmp:[{svc:"DAX",feature:"ホットキーキャッシュ",rto:"マイクロ秒レスポンス",cost:"DAX料金(RCU削減で相殺)",note:"✓ 推奨"},{svc:"キャパシティ増加",feature:"スロットリング解消",rto:"即時効果",cost:"増加",note:"根本解決にならない"},{svc:"オンデマンド",feature:"自動スケール",rto:"スロットリングなし",cost:"ホットキーなら高額になる場合",note:"ホットキー問題は解消しない"}],kws:["DynamoDB","DAX","ホットキー","RCU","コスト削減"]},
  {domain:"コスト",cat:"コスト最適化",diff:"Medium",q:"AWS Compute Optimizer を使ったところ、多数のEC2インスタンスが過剰プロビジョニングされていることがわかった。コスト削減のための正しいアプローチは？",opts:["全インスタンスを即座に推奨タイプに変更","Compute Optimizerの推奨を確認し、テスト環境で検証後に段階的に本番適用","全インスタンスをSpot Instanceに変更","インスタンス数を半分に削減"],ans:1,why:"Compute Optimizerの推奨は過去の使用状況に基づくが、本番適用前にテスト環境での動作確認が重要。段階的な適用でリスクを最小化しつつコスト削減を実現できる。一部のインスタンスはリサイズよりSavings Plansの方が効果的な場合もある。",trap:"即座の全変更はアプリケーションへの影響リスクが高い。全Spot変更は中断許容できないワークロードには不適切。インスタンス数削減はキャパシティが不足するリスクがある。",cmp:[{svc:"推奨確認→検証→段階適用",feature:"リスク最小・確実な削減",rto:"段階的",cost:"削減効果大",note:"✓ 推奨"},{svc:"即座に全変更",feature:"迅速なコスト削減",rto:"リスク高",cost:"削減効果大",note:"本番リスクあり"},{svc:"全Spot変更",feature:"最大割引",rto:"中断リスク",cost:"最低",note:"全ワークロードに不適切"}],kws:["Compute Optimizer","過剰プロビジョニング","右サイジング","段階的変更","コスト最適化"]},
  {domain:"移行",cat:"Migration",diff:"Medium",q:"オンプレMySQLデータベース(10TB)を最小ダウンタイムでAurora MySQLへ移行したい。最適な戦略は？",opts:["mysqldumpで全データをエクスポートしてインポート","AWS DMS継続レプリケーション + フェイルオーバーカットオーバー","AWS SCT + DMSフルロード","Snowballで物理転送後にDMS差分適用"],ans:1,why:"DMS継続レプリケーション(CDC)はソースDBを稼働させたまま差分データを継続同期。カットオーバー時のダウンタイムを数分に抑えられます。",trap:"mysqldumpはダウンタイムが数時間〜数日になり本番では非現実的。SCT+フルロードのみでは差分が取れないため長時間のダウンタイムが発生。",cmp:[{svc:"DMS CDC",feature:"ダウンタイム: 分単位",rto:"複雑度: 中",cost:"中",note:"✓ 推奨"},{svc:"mysqldump",feature:"ダウンタイム: 時間〜日",rto:"複雑度: 低",cost:"低",note:"小規模のみ"},{svc:"Snowball+DMS",feature:"超低帯域向け",rto:"複雑度: 高",cost:"高",note:"特殊ケース"}],kws:["DMS","CDC","継続レプリケーション","カットオーバー","最小ダウンタイム"]},
  {domain:"移行",cat:"Migration",diff:"Hard",q:"オンプレの大規模Hadoopクラスタ(毎日5TB処理)をAWSへ移行。既存のHive/SparkジョブをできるだけそのままAWSで実行したい。最適なサービスは？",opts:["AWS Glue (サーバーレスSpark)","Amazon EMR (EC2またはEKS上)","Amazon Athena","AWS Batch + Fargate"],ans:1,why:"EMRはHadoop/Spark/Hiveを完全サポートし、既存ジョブをほぼそのまま移植可能。EMR on EKSはKubernetes上でSparkを実行でき、EC2 Spot活用でコスト削減も実現。",trap:"AWS Glueは変換ジョブ向けサーバーレスSparkだが、複雑なHadoopエコシステムの移植には制約がある。AthenaはS3上のSQLクエリのみでバッチ処理パイプラインには不向き。",cmp:[{svc:"EMR",feature:"Hadoop/Spark互換",rto:"フル制御",cost:"中〜高",note:"✓ 移植性最高"},{svc:"Glue",feature:"サーバーレスSpark",rto:"サーバーレス",cost:"中",note:"シンプルETL向け"},{svc:"Athena",feature:"SQL on S3",rto:"サーバーレス",cost:"低",note:"クエリのみ"}],kws:["EMR","Hadoop互換","Spark","Hive","リフト&シフト"]},
  {domain:"移行",cat:"Migration",diff:"Medium",q:"500台のオンプレサーバーをAWSへ移行する計画を立てている。まず最初にすべきことは？",opts:["全サーバーをEC2にリフト&シフトで移行開始","AWS Application Discovery Serviceでサーバーの依存関係と使用状況を調査","AWS Migration Hubでダッシュボードを設定","CloudEndureで全サーバーのレプリケーションを開始"],ans:1,why:"移行前の現状把握が最重要。Application Discovery ServiceはエージェントまたはエージェントレスでオンプレサーバーのCPU/メモリ使用率・ネットワーク依存関係を収集・分析する。依存関係を無視した移行は障害の原因になる。",trap:"依存関係調査なしのリフト&シフトは移行後に障害が発生するリスクが高い。Migration Hubは移行の進捗管理ツールで現状把握ツールではない。CloudEndureはレプリケーションツールで計画策定には不向き。",cmp:[{svc:"Application Discovery",feature:"依存関係・使用状況調査",rto:"移行前の必須ステップ",cost:"無料",note:"✓ 最初にやること"},{svc:"Migration Hub",feature:"進捗ダッシュボード",rto:"調査後に使用",cost:"無料",note:"現状把握後に活用"},{svc:"CloudEndure",feature:"ライブマイグレーション",rto:"計画後に使用",cost:"無料(EC2料金別)",note:"調査完了後に使用"}],kws:["Application Discovery Service","依存関係","Migration Hub","移行計画","現状把握"]},
  {domain:"移行",cat:"Migration",diff:"Medium",q:"オンプレのOracle DBをAWSに移行したい。ライセンスコストを削減するためOracleから脱却してPostgreSQLに変換したい。必要なツールの組み合わせは？",opts:["DMSのみで直接移行","AWS SCT(Schema Conversion Tool)でスキーマ変換 + DMSでデータ移行","Snowballでデータを物理転送","手動でSQLを書き直す"],ans:1,why:"SCTはOracleのDDL・ストアドプロシージャ・ビューをPostgreSQL互換に自動変換し、変換できない部分をレポートする。DMSがデータを移行し継続レプリケーション(CDC)で最小ダウンタイムを実現。異種DB間移行の標準的なアプローチ。",trap:"DMSのみでは異種DB間のスキーマ変換ができない。SnowballはデータのDB変換機能がない。手動SQL書き直しは数万行規模では現実的でない。",cmp:[{svc:"SCT+DMS",feature:"スキーマ変換+データ移行",rto:"異種DB移行の標準",cost:"中",note:"✓ 推奨"},{svc:"DMS のみ",feature:"同種DB移行には有効",rto:"異種スキーマ変換不可",cost:"低",note:"同種DBのみ"},{svc:"手動変換",feature:"完全なカスタマイズ",rto:"工数が膨大",cost:"人件費高",note:"大規模では非現実的"}],kws:["SCT","DMS","異種DB移行","Oracle","PostgreSQL"]},
  {domain:"移行",cat:"大量データ転送",diff:"Medium",q:"オンプレのデータセンターに100TBのデータがある。専用線もなくインターネット帯域が100Mbpsしかない。AWSへの転送に最も適した方法は？",opts:["インターネット経由でS3に直接アップロード","AWS Snowball Edge Storage Optimizedを使って物理転送","Direct Connectを新規開通してから転送","S3 Transfer Accelerationを使用"],ans:1,why:"100Mbpsで100TBを転送すると約92日かかる。Snowball Edgeは物理デバイス(80TB容量)を使って物理的にデータを転送。配送込みで約1週間で完了できる。コストもインターネット転送より大幅に安い。",trap:"インターネット直接アップロードは転送時間が現実的でない。Direct Connect新規開通は数ヶ月かかり費用も高い。S3 Transfer Accelerationはインターネット経由なので100Mbpsの帯域制約は変わらない。",cmp:[{svc:"Snowball Edge",feature:"物理転送・約1週間",rto:"帯域不要",cost:"デバイス料金+配送",note:"✓ 推奨"},{svc:"インターネット直接",feature:"追加機器不要",rto:"約92日",cost:"転送料",note:"現実的でない"},{svc:"S3 Transfer Acceleration",feature:"高速化",rto:"帯域制約は変わらず",cost:"追加料金",note:"帯域が根本制約"}],kws:["Snowball Edge","物理転送","大量データ","帯域制約","S3"]},
  {domain:"移行",cat:"Migration",diff:"Hard",q:"オンプレの仮想マシン(VMware vSphere)をAWSに移行したい。OSやアプリを変更せずにそのままEC2で動かしたい。最適なツールは？",opts:["手動でAMIを作成してEC2を起動","AWS Application Migration Service(MGN)","AWS DMS","AWS Snowball"],ans:1,why:"MGN(旧CloudEndure Migration)はオンプレVMをリアルタイムにレプリケーションし、テスト後にカットオーバーするライブマイグレーションツール。VMwareのVMをOSやアプリの変更なしにEC2に移行できる。ダウンタイムは数分のみ。",trap:"手動AMI作成はVMwareのディスクフォーマットをAMI形式に変換する複雑な作業が必要。DMSはDBの移行ツールでVMの移行には使えない。Snowballはデータ転送ツールでVMのライブマイグレーション機能はない。",cmp:[{svc:"MGN",feature:"ライブレプリケーション",rto:"カットオーバー数分",cost:"無料(EC2料金別)",note:"✓ 推奨"},{svc:"手動AMI",feature:"フル制御",rto:"ダウンタイム長",cost:"無料",note:"複雑な変換作業が必要"},{svc:"VM Import/Export",feature:"VMイメージ変換",rto:"レプリケーションなし",cost:"無料",note:"一時点のスナップショットのみ"}],kws:["Application Migration Service","MGN","ライブマイグレーション","VMware","リフト&シフト"]},
  {domain:"移行",cat:"Migration",diff:"Medium",q:"モノリシックなオンプレアプリをAWSに移行する際、「7R」の移行戦略のうち最もコストと工数が低い戦略はどれか？",opts:["Re-architect(再設計)","Rehost(リフト&シフト)","Re-platform(プラットフォーム変更)","Retire(廃止)"],ans:1,why:"Rehost(リフト&シフト)はアプリを変更せずそのままEC2等に移行する戦略で、最も工数が少なくスピーディ。Application Migration Serviceで自動化できる。まず移行してからクラウドネイティブ化する段階的アプローチが現実的。",trap:"Re-architectは最も工数とコストが高いが長期的な価値が高い。Re-platformはDBをRDSに変えるなど中程度の変更。Retireは廃止なので移行コストはゼロだが機能を失う(7Rの中では別カテゴリ)。",cmp:[{svc:"Rehost",feature:"変更最小・迅速",rto:"工数最小",cost:"最低",note:"✓ 最小コスト"},{svc:"Re-platform",feature:"一部最適化",rto:"中程度の工数",cost:"中",note:"DBのRDS移行など"},{svc:"Re-architect",feature:"クラウドネイティブ",rto:"最大工数",cost:"最高",note:"長期的価値は最大"}],kws:["7R","Rehost","リフト&シフト","移行戦略","Re-architect"]},
  {domain:"移行",cat:"Migration",diff:"Hard",q:"オンプレのSQL Server(Windows認証使用)をRDS for SQL Serverに移行したい。Windows認証を継続して使いたい。必要な構成は？",opts:["RDS for SQL Serverに移行してIAM認証に切り替え","RDS for SQL Server + AWS Directory Service(Managed AD) + Kerberos認証","RDS for MySQLに変換してIAM認証","Aurora PostgreSQLに変換"],ans:1,why:"RDS for SQL ServerはManaged Microsoft ADとの統合によりKerberos認証(Windows認証)をサポートする。既存のADユーザー/グループでSQL Serverにアクセスでき、ユーザー管理の変更が最小限。",trap:"IAM認証への切り替えはアプリの接続文字列変更が必要でWindows認証の継続ではない。MySQLやAuroraへの変換はSQLの互換性問題が発生しSQL Serverからの変換は大規模な改修が必要。",cmp:[{svc:"RDS+Managed AD+Kerberos",feature:"Windows認証継続",rto:"AD統合",cost:"中(AD料金追加)",note:"✓ 推奨"},{svc:"IAM認証",feature:"AWSネイティブ",rto:"アプリ変更必要",cost:"低",note:"Windows認証の継続ではない"},{svc:"MySQL/Aurora変換",feature:"オープンソース",rto:"大規模改修",cost:"低(ライセンス削減)",note:"互換性問題あり"}],kws:["RDS","SQL Server","Windows認証","Kerberos","Directory Service"]},
  {domain:"移行",cat:"Migration",diff:"Medium",q:"オンプレのファイルサーバー(Windows共有フォルダ・SMBプロトコル)をAWSに移行したい。既存のWindowsクライアントからそのままアクセスできるようにしたい。最適なサービスは？",opts:["S3バケットに移行してアプリを修正","Amazon FSx for Windows File Server","Amazon EFS","Storage Gateway(File Gateway)"],ans:1,why:"FSx for Windows File ServerはフルマネージドのWindows Server SMBファイルシステム。Active Directory統合・DFS・VSS(シャドウコピー)に対応し、既存のWindowsクライアントからドライブレターでそのままアクセスできる。",trap:"S3はオブジェクトストレージでSMBに対応していないためアプリの修正が必要。EFSはNFS(Linux向け)でWindowsのSMBには直接対応していない。Storage Gateway File GatewayはS3をNFS/SMBで公開するがAD統合等はFSxの方が高機能。",cmp:[{svc:"FSx for Windows",feature:"SMB・AD統合・完全互換",rto:"変更最小",cost:"中",note:"✓ 推奨"},{svc:"EFS",feature:"NFSマネージド",rto:"Linux向け",cost:"中",note:"Windowsクライアントには不向き"},{svc:"Storage Gateway",feature:"ハイブリッド",rto:"S3バックエンド",cost:"低〜中",note:"FSxより機能が限定的"}],kws:["FSx for Windows","SMB","Active Directory","ファイルサーバー","Windows移行"]},
  {domain:"移行",cat:"Migration",diff:"Hard",q:"複数のオンプレDBを段階的にAWSに移行しながら、移行中も全体の進捗を一元管理したい。最適なサービスは？",opts:["Excelで移行状況を管理","AWS Migration Hub + DMS + Application Migration Service","CloudWatchダッシュボードで監視","Systems Managerで管理"],ans:1,why:"Migration Hubは複数の移行ツール(DMS・MGN・CloudEndure等)の進捗を一元的に可視化するダッシュボード。サーバーごとの移行ステータス・完了率・問題点を追跡できる。大規模移行プロジェクトのコントロールタワーとして機能する。",trap:"Excelは規模が大きくなると管理が困難でリアルタイム更新ができない。CloudWatchはインフラ監視ツールで移行進捗管理には不向き。Systems Managerはサーバー管理ツールで移行ダッシュボードではない。",cmp:[{svc:"Migration Hub",feature:"移行進捗の一元管理",rto:"複数ツール統合",cost:"無料",note:"✓ 推奨"},{svc:"Excel",feature:"シンプル",rto:"リアルタイム更新なし",cost:"無料",note:"大規模には不向き"},{svc:"CloudWatch",feature:"インフラ監視",rto:"移行進捗管理ではない",cost:"有料",note:"目的が異なる"}],kws:["Migration Hub","移行進捗","DMS","MGN","一元管理"]},
  {domain:"移行",cat:"Migration",diff:"Medium",q:"オンプレのRedisキャッシュをAWSに移行したい。既存のRedisクライアントコードを変更せずに移行でき、かつマネージドサービスを使いたい。最適な選択は？",opts:["EC2にRedisをインストールして自己管理","ElastiCache for Redis","DynamoDB DAXに変換","MemoryDB for Redis"],ans:3,why:"MemoryDB for Redisは完全なRedis互換APIを提供するマネージドサービスで、既存のRedisクライアントコードをそのまま使える。さらにマルチAZのトランザクションログで永続性も保証。ElastiCache for Redisより高い耐久性が必要な場合に最適。",trap:"EC2自己管理はパッチ適用・フェイルオーバーの管理が必要。ElastiCacheも選択肢だが本問では「コードを変更せず」かつ「マネージド」の両方を満たすMemoryDBが最も完全な選択。DAX変換はAPIが異なりコード変更が必要。",cmp:[{svc:"MemoryDB for Redis",feature:"完全Redis互換+永続性",rto:"コード変更不要",cost:"中",note:"✓ 推奨"},{svc:"ElastiCache Redis",feature:"Redis互換+高速",rto:"コード変更不要",cost:"低〜中",note:"永続性はMemoryDBより低い"},{svc:"EC2 Redis",feature:"完全カスタム",rto:"運用管理が必要",cost:"低",note:"マネージドではない"}],kws:["MemoryDB","Redis","ElastiCache","互換性","マネージド"]},
  {domain:"移行",cat:"Migration",diff:"Medium",q:"オンプレのモノリシックアプリをAWSに移行後、段階的にマイクロサービス化したい。移行直後の最初のステップとして最適なのは？",opts:["一気にコンテナ化してEKSに移行","Strangler Figパターンで機能を段階的に切り出す","全機能をLambdaに書き直す","現状維持でEC2に移行のみ行う"],ans:1,why:"Strangler Figパターンはモノリスを一度に書き直さず、機能ごとに段階的にマイクロサービスとして切り出す戦略。ALBのルーティングで新機能はマイクロサービスへ、既存機能はモノリスへ振り分ける。リスクを最小化しながら段階的にモダナイズできる。",trap:"一気のEKS移行は技術的負債を全て一度に解消しようとするリスクが高い。Lambda全書き直しはアーキテクチャの根本的な変更で工数が膨大。現状維持はクラウドのメリットを活かせない。",cmp:[{svc:"Strangler Figパターン",feature:"段階的・リスク最小",rto:"継続的デリバリー",cost:"中(段階的投資)",note:"✓ 推奨"},{svc:"一気にEKS移行",feature:"最終形に近い",rto:"リスク高",cost:"高(一括投資)",note:"失敗リスクが大きい"},{svc:"Lambda全書き直し",feature:"サーバーレス最適化",rto:"最大工数",cost:"最高",note:"一度に全てを変えるのはリスク大"}],kws:["Strangler Fig","マイクロサービス化","段階的移行","モダナイゼーション","ALB"]},
  {domain:"コンテナ",cat:"コンテナ/サーバーレス",diff:"Medium",q:"マイクロサービスで、サービスAがサービスBの処理完了を待たずに非同期で処理継続したい。疎結合な設計として最適なのは？",opts:["ALB + ECS間の同期HTTP呼び出し","Amazon SQS + Lambda / ECSコンシューマー","API Gateway + Lambda同期呼び出し","Step Functions + 同期Express Workflow"],ans:1,why:"SQSはプロデューサー/コンシューマーを完全に分離。サービスAはメッセージをキューに送信後すぐに次の処理へ進めます。障害時はDLQでメッセージ保護。",trap:"同期HTTP呼び出しはサービスB障害がサービスAに波及し、疎結合ではない。Step Functions同期Expressは呼び出し元がブロックされるため非同期処理には不適切。",cmp:[{svc:"SQS",feature:"非同期・疎結合",rto:"At-least-once",cost:"低",note:"✓ 推奨"},{svc:"SNS",feature:"非同期・ファンアウト",rto:"At-least-once",cost:"低",note:"複数サブスクライバ向け"},{svc:"EventBridge",feature:"イベント駆動",rto:"複雑なルーティング",cost:"低",note:"複雑なイベントに"}],kws:["SQS","疎結合","非同期","DLQ","マイクロサービス"]},
  {domain:"コンテナ",cat:"ECS",diff:"Medium",q:"ECSでコンテナアプリを動かしている。コンテナが異常終了した場合に自動で再起動させ、常に3台動かし続けたい。最適な設定は？",opts:["EC2のcronでコンテナを定期チェック","ECSサービス定義でdesired count=3を設定","ECSタスク定義でrestartPolicyを設定","CloudWatchアラームでLambdaが再起動"],ans:1,why:"ECSサービスはdesired countで指定した数のタスクを常時維持する。タスクが異常終了するとECSサービスが自動的に新しいタスクを起動して指定数を維持する。ヘルスチェックと組み合わせることで自動回復を実現。",trap:"cronによるチェックは検知〜再起動までのタイムラグがある。restartPolicyはECSタスク定義ではなくDockerの設定で、ECSサービスと競合する場合がある。CloudWatch+Lambdaは複雑でECSサービスで十分。",cmp:[{svc:"ECSサービス(desired count)",feature:"自動タスク維持",rto:"即時再起動",cost:"無料",note:"✓ 推奨"},{svc:"cron+チェック",feature:"定期確認",rto:"検知遅延あり",cost:"無料",note:"リアルタイム性がない"},{svc:"CloudWatch+Lambda",feature:"カスタム自動化",rto:"実装コスト高",cost:"低",note:"ECSサービスで代替可能"}],kws:["ECSサービス","desired count","自動再起動","タスク維持","ヘルスチェック"]},
  {domain:"コンテナ",cat:"EKS",diff:"Hard",q:"EKSクラスターでPodが増加した際にEC2ノードを自動追加し、Pod削減時にはノードを自動削除してコストを最適化したい。最適な構成は？",opts:["手動でノードグループのEC2を追加・削除","Cluster Autoscaler + EC2 Auto Scalingグループ","Horizontal Pod Autoscaler(HPA)のみ","EKS Fargate Profileに全て移行"],ans:1,why:"Cluster AutoscalerはPendingなPodを検出するとAuto ScalingグループにスケールアウトをリクエストしEC2ノードを追加する。リソースが余剰になるとノードをdrainしてスケールインする。コスト最適化と自動スケールを両立。",trap:"手動追加は運用負担が大きくリアルタイム対応できない。HPAはPodのスケール(レプリカ数の増減)でノードのスケールではない。Fargateはノード管理不要だが全ワークロードへの適用はコストが高くなる場合がある。",cmp:[{svc:"Cluster Autoscaler",feature:"ノード自動スケール",rto:"Pending Pod検出後数分",cost:"無料(EC2料金別)",note:"✓ 推奨"},{svc:"HPA",feature:"Podレプリカ数の自動調整",rto:"即時",cost:"無料",note:"ノードスケールは別途必要"},{svc:"Fargate",feature:"ノード管理不要",rto:"即時",cost:"Pod単位課金",note:"全移行はコスト増の可能性"}],kws:["Cluster Autoscaler","EKS","ノードスケール","Auto Scaling","コスト最適化"]},
  {domain:"コンテナ",cat:"サーバーレス",diff:"Medium",q:"Lambda関数が増えてきて管理が煩雑になってきた。複数のLambda関数をまとめてデプロイ・管理・モニタリングしたい。最適なツールは？",opts:["AWS Management Consoleで個別管理","AWS SAM(Serverless Application Model)またはAWS CDK","EC2上にNode.jsサーバーを構築","CloudFormationのみ使用"],ans:1,why:"SAMはサーバーレスアプリの定義・デプロイを簡略化するフレームワーク。Lambda・API Gateway・DynamoDBをYAMLで定義しsam deployで一括デプロイ。ローカルでのテスト(sam local invoke)も可能。CDKはTypeScript等でインフラをコード化できる。",trap:"コンソール個別管理はスケールしない。EC2はサーバーレスのメリットを失う。CloudFormationだけでもLambdaを定義できるがSAMはLambda特化の簡略構文を提供しより効率的。",cmp:[{svc:"SAM/CDK",feature:"IaC・一括デプロイ・ローカルテスト",rto:"開発効率高",cost:"無料",note:"✓ 推奨"},{svc:"コンソール個別管理",feature:"シンプル",rto:"スケールしない",cost:"無料",note:"複数関数には不向き"},{svc:"CloudFormation",feature:"汎用IaC",rto:"Lambda特化構文なし",cost:"無料",note:"SAMはCFnの拡張"}],kws:["SAM","CDK","サーバーレス","IaC","Lambda管理"]},
  {domain:"コンテナ",cat:"ECS",diff:"Hard",q:"ECS on FargateでBlue/Greenデプロイを実現したい。新バージョンのコンテナを安全にリリースし、問題があれば即ロールバックしたい。最適な構成は？",opts:["新しいタスク定義を作成して手動でサービスを更新","CodeDeploy + ECS(Blue/Greenデプロイタイプ) + ALB","EC2 Auto ScalingのRolling Updateを使用","Route 53加重ルーティングで切り替え"],ans:1,why:"CodeDeployのECS Blue/Greenデプロイはgreen環境(新バージョン)を起動し、ALBのトラフィックを段階的に切り替える。テスト後に問題なければBlue環境を削除。問題があればALBルールを元に戻すだけでロールバック完了。",trap:"手動サービス更新はロールバックが手動で遅い。EC2 Auto ScalingのRolling Updateはコンテナではなくインスタンスのローリング更新。Route 53切り替えはDNS TTLの影響があり即時ロールバックが困難。",cmp:[{svc:"CodeDeploy Blue/Green",feature:"段階的切り替え+即時ロールバック",rto:"ゼロダウンタイム",cost:"CodeDeploy無料",note:"✓ 推奨"},{svc:"手動更新",feature:"シンプル",rto:"ロールバックが遅い",cost:"無料",note:"自動化されていない"},{svc:"Route 53加重",feature:"トラフィック分割",rto:"DNS TTL影響",cost:"低",note:"ECS向けにはCodeDeployが最適"}],kws:["CodeDeploy","Blue/Green","ECS","ゼロダウンタイム","ロールバック"]},
  {domain:"コンテナ",cat:"コンテナレジストリ",diff:"Medium",q:"ECSで使うDockerイメージを安全に管理したい。脆弱性スキャンと不正アクセス防止が要件。最適なサービスと設定は？",opts:["DockerHubにパブリックで公開","ECR(プライベートリポジトリ) + イメージスキャン(自動) + リポジトリポリシー","S3にDockerイメージをtar形式で保存","GitHub Container Registryを使用"],ans:1,why:"ECRはAWSのフルマネージドコンテナレジストリ。プライベートリポジトリでIAMによるアクセス制御。プッシュ時の自動イメージスキャンで脆弱性CVEを検出。VPCエンドポイントでプライベートアクセスも可能。",trap:"DockerHubパブリックは誰でもプルできてしまいセキュリティ要件を満たさない。S3へのtar保存はECSと直接統合できない。GitHub Container Registryは使えるがAWSサービスとの統合はECRの方が優れている。",cmp:[{svc:"ECR",feature:"プライベート+スキャン+IAM統合",rto:"ECS/EKSとネイティブ統合",cost:"ストレージ料金のみ",note:"✓ 推奨"},{svc:"DockerHub",feature:"シンプル・有名",rto:"パブリックリスク",cost:"無料〜",note:"プライベート要件に不適"},{svc:"GitHub Registry",feature:"CI/CD統合",rto:"AWSとの統合が手間",cost:"無料〜",note:"ECRの方がAWS統合が容易"}],kws:["ECR","イメージスキャン","コンテナレジストリ","脆弱性","IAM"]},
  {domain:"コンテナ",cat:"EKS",diff:"Hard",q:"EKSのPodからS3やDynamoDBにアクセスさせたい。セキュリティのベストプラクティスに従った認証方法は？",opts:["EC2ノードのインスタンスプロファイルにS3/DynamoDBの権限を付与","IRSA(IAM Roles for Service Accounts)を使用","Podにアクセスキーを環境変数で設定","全PodにAdmin権限のIAMロールを付与"],ans:1,why:"IRSA(IAM Roles for Service Accounts)はK8sのService AccountにIAMロールを関連付け、そのService Accountを使うPodだけに最小権限でAWSリソースアクセスを付与できる。OIDCプロバイダーを通じて一時的な認証情報を発行する。",trap:"インスタンスプロファイルはノード上の全Podが同じ権限を持ってしまい最小権限に違反。アクセスキーは漏洩リスクが高く定期的なローテーションも必要。Admin権限付与は明らかに過剰権限。",cmp:[{svc:"IRSA",feature:"Pod単位の最小権限",rto:"一時認証情報",cost:"無料",note:"✓ 推奨"},{svc:"インスタンスプロファイル",feature:"設定シンプル",rto:"全Podが同一権限",cost:"無料",note:"最小権限に違反"},{svc:"アクセスキー",feature:"どこでも使える",rto:"漏洩リスク",cost:"無料",note:"非推奨"}],kws:["IRSA","IAM Roles for Service Accounts","EKS","OIDC","最小権限"]},
  {domain:"コンテナ",cat:"サーバーレス",diff:"Medium",q:"Lambda関数でRDSに接続するアプリがある。同時実行数が増えるとRDSの接続数上限に達してエラーになる問題が発生している。最適な解決策は？",opts:["Lambdaの同時実行数を制限する","RDS Proxyを使用して接続をプール化","RDSのmax_connectionsを増やす","LambdaをEC2に移行する"],ans:1,why:"RDS ProxyはLambdaとRDSの間に立って接続をプール・再利用する。Lambdaが大量に同時実行されても実際のDB接続数はRDS Proxyが管理し、RDSへの接続数を大幅に削減できる。フェイルオーバー時間の短縮効果もある。",trap:"同時実行数制限はスロットリングでアプリのパフォーマンスが低下する。max_connections増加はDB側のメモリを消費しDB自体のパフォーマンスが低下する。EC2移行はサーバーレスのメリットを失う。",cmp:[{svc:"RDS Proxy",feature:"接続プール・再利用",rto:"接続数問題を根本解決",cost:"RDS料金の数%",note:"✓ 推奨"},{svc:"同時実行数制限",feature:"接続数を抑制",rto:"スロットリング発生",cost:"無料",note:"パフォーマンス低下"},{svc:"max_connections増加",feature:"即時対応",rto:"DBメモリ圧迫リスク",cost:"無料",note:"根本解決にならない"}],kws:["RDS Proxy","接続プール","Lambda","同時実行","コネクション枯渇"]},
  {domain:"コンテナ",cat:"ECS",diff:"Medium",q:"ECS Fargateのコンテナに機密情報(APIキー)を安全に渡したい。コンテナイメージにシークレットを含めず、かつ環境変数としてコンテナから参照できるようにしたい。最適な方法は？",opts:["Dockerfileにハードコード","ECSタスク定義のsecretsフィールド + Secrets Manager/SSM Parameter Store","S3バケットからコンテナ起動時に取得","ALBヘッダーで渡す"],ans:1,why:"ECSタスク定義のsecretsフィールドでSecrets ManagerまたはSSM Parameter StoreのARN/名前を指定すると、ECSがコンテナ起動時に自動でシークレットを取得して環境変数として注入する。コンテナイメージに機密情報が含まれず、ローテーションにも対応。",trap:"Dockerfileハードコードはイメージをpullできる誰もがシークレットを参照できる。S3取得はアプリ側の実装が必要で複雑。ALBヘッダーはHTTPアクセスログに残るリスクがある。",cmp:[{svc:"ECSタスク定義+Secrets Manager",feature:"自動注入・ローテーション対応",rto:"コンテナ起動時に取得",cost:"Secrets Manager料金",note:"✓ 推奨"},{svc:"Dockerfileハードコード",feature:"シンプル",rto:"イメージに平文",cost:"無料",note:"セキュリティリスク"},{svc:"S3から取得",feature:"柔軟",rto:"アプリ実装が必要",cost:"低",note:"複雑で管理が難しい"}],kws:["Secrets Manager","ECSタスク定義","シークレット注入","Fargate","セキュリティ"]},
  {domain:"コンテナ",cat:"EKS",diff:"Hard",q:"EKSで複数のチームが同一クラスターを使っている。チームAはチームBのPodにアクセスできないようにネットワークレベルで制限したい。最適な方法は？",opts:["NamespaceをチームごとにわけてRBACを設定","Network PolicyでNamespace間の通信を制限","セキュリティグループでEC2ノード間通信を制限","チームごとに別クラスターを作成"],ans:1,why:"KubernetesのNetwork PolicyはPod間・Namespace間のL3/L4レベルのトラフィックを制御できる。チームAのNamespaceからチームBのNamespaceへのingressを拒否するポリシーを設定することでネットワークレベルの分離を実現。",trap:"RBAC+Namespaceは権限の分離はできるがネットワーク通信は制限できない(RBACはAPIサーバーへのアクセス制御)。セキュリティグループはノードレベルの制御でPodレベルの細かい制御は困難。別クラスター作成は管理コストが倍増する。",cmp:[{svc:"Network Policy",feature:"Pod/Namespace間L3/L4制御",rto:"宣言的定義",cost:"無料",note:"✓ 推奨"},{svc:"RBAC+Namespace",feature:"API権限の分離",rto:"ネットワーク通信は制限できない",cost:"無料",note:"目的が異なる"},{svc:"別クラスター",feature:"完全な分離",rto:"管理コスト倍増",cost:"高",note:"コスト効率が悪い"}],kws:["Network Policy","Namespace","RBAC","EKS","Pod間通信制限"]},
  {domain:"コンテナ",cat:"サーバーレス",diff:"Medium",q:"コンテナ化したアプリをサーバーレスで動かしたい。EC2インスタンスの管理を一切したくなく、コンテナイメージをそのまま実行できる最もシンプルな選択肢は？",opts:["EC2にDockerをインストールして実行","ECS on Fargate","EKS on EC2","Lambda(コンテナイメージ対応)"],ans:1,why:"ECS on Fargateはコンテナをサーバーレスで実行できるマネージドサービス。EC2インスタンスの管理・パッチ適用・スケーリングが不要で、タスク定義でコンテナイメージを指定するだけで実行できる。長時間実行や常時起動に向く。",trap:"EC2+Dockerはインスタンス管理が必要。EKS on EC2はK8sクラスターとEC2ノードの管理が必要。Lambdaのコンテナイメージ対応は最大15分の制限があり常時起動には向かない。",cmp:[{svc:"ECS Fargate",feature:"サーバーレス・長時間実行対応",rto:"インスタンス管理不要",cost:"タスク単位課金",note:"✓ 推奨"},{svc:"Lambda(コンテナ)",feature:"サーバーレス",rto:"最大15分制限",cost:"リクエスト単位",note:"短時間処理向け"},{svc:"EC2+Docker",feature:"フル制御",rto:"インスタンス管理必要",cost:"EC2料金",note:"管理負担あり"}],kws:["ECS Fargate","サーバーレスコンテナ","インスタンス管理不要","コンテナ","マネージド"]},
  {domain:"コンテナ",cat:"ECS",diff:"Medium",q:"ECSサービスでCPU使用率が70%を超えたら自動でタスクを追加し、30%を下回ったらタスクを削除したい。最適な設定は？",opts:["手動でdesired countを変更","ECSサービスのApplication Auto Scaling + ターゲット追跡スケーリング","CloudWatchアラーム + Lambda(タスク追加)","EC2 Auto Scalingを設定"],ans:1,why:"ECSサービスのApplication Auto ScalingはECSタスク数を自動的にスケールする機能。ターゲット追跡スケーリングポリシーでCPU使用率の目標値(例:50%)を設定すると、その値を維持するように自動でタスク数を調整する。",trap:"手動変更は運用負担が大きい。CloudWatch+Lambdaは実装コストが高くECSのAuto Scalingで代替可能。EC2 Auto ScalingはEC2インスタンス数のスケールでECSタスク数のスケールではない。",cmp:[{svc:"Application Auto Scaling",feature:"タスク数の自動スケール",rto:"設定のみ",cost:"無料",note:"✓ 推奨"},{svc:"CloudWatch+Lambda",feature:"カスタム自動化",rto:"実装コスト高",cost:"低",note:"Application Auto Scalingで代替可能"},{svc:"EC2 Auto Scaling",feature:"インスタンス数スケール",rto:"タスク数制御とは別",cost:"無料",note:"目的が異なる"}],kws:["Application Auto Scaling","ターゲット追跡","ECSタスク","CPU使用率","自動スケール"]},
  {domain:"データ",cat:"データ設計",diff:"Hard",q:"1日1TBのログデータをほぼリアルタイムに分析し、Athenaでアドホッククエリも実行したい。最適なアーキテクチャは？",opts:["Kinesis Data Streams → Lambda → RDS","Kinesis Data Firehose → S3 (Parquet変換) → Athena + Glue Data Catalog","Kinesis Data Streams → Redshift Streaming Ingestion","SQS → Lambda → Aurora"],ans:1,why:"Firehoseは自動的にParquetへ変換しS3に配置。Glue CatalogはS3のスキーマを管理し、AthenaがSQL on S3を実現。サーバーレスでスケール・コストともに優秀。",trap:"RDS/Auroraは分析ワークロード向きではなく、1TB/日の書き込みにスケールしない。RedshiftはアドホックS3クエリのみならAthenaの方がコスト効率が高い。",cmp:[{svc:"Firehose+Athena",feature:"準RT・サーバーレス",rto:"シンプル",cost:"低",note:"✓ 推奨"},{svc:"Kinesis+Redshift",feature:"RT・高スループット",rto:"中",cost:"中〜高",note:"複雑な分析向け"},{svc:"MSK+EMR",feature:"RT・大規模変換",rto:"高",cost:"高",note:"大規模ETL向け"}],kws:["Kinesis Firehose","Athena","Parquet","Glue Data Catalog","サーバーレス分析"]},
  {domain:"設計",cat:"スケーラビリティ",diff:"Medium",q:"EC2ベースのWebアプリで急激なトラフィックスパイク(平均100倍)に対応したい。コスト最適かつ高速スケールな構成は？",opts:["EC2 Auto Scaling (ステップスケーリング) のみ","CloudFront + ALB + EC2 Auto Scaling (ターゲット追跡) + ElastiCache","EC2を常時大量台数起動","RDS Multi-AZ + Read Replicaのみ増やす"],ans:1,why:"CloudFrontでエッジキャッシュによりオリジンへの負荷を大幅削減。ElastiCacheでDBクエリをキャッシュ。ターゲット追跡スケーリングはCPU/リクエスト数に基づき自動調整。",trap:"Auto Scalingのみでは起動に3〜5分かかり急激スパイクに間に合わない。常時大量台数はコスト非効率。",cmp:[{svc:"CloudFront",feature:"エッジキャッシュ",rto:"即時",cost:"低",note:"オリジン負荷削減"},{svc:"ElastiCache",feature:"DBキャッシュ",rto:"マイクロ秒",cost:"中",note:"DBスパイク吸収"},{svc:"Auto Scaling",feature:"EC2追加",rto:"3〜5分",cost:"変動",note:"根本スケール"}],kws:["CloudFront","ElastiCache","ターゲット追跡","Auto Scaling","キャッシュ戦略"]},
  {domain:"設計",cat:"マイクロサービス",diff:"Medium",q:"EC2上のモノリシックアプリをマイクロサービス化したい。各サービスを独立してデプロイでき、サービス間通信を疎結合にする構成として最適なのは？",opts:["EC2インスタンスを増やしてコードを分割","ECS + ALB(パスベースルーティング) + SQS(非同期通信)","Lambda + API Gateway(同期のみ)","EC2 + ENIを使ったサービス間直接通信"],ans:1,why:"ECSでコンテナ単位の独立デプロイが可能。ALBのパスベースルーティングで /service-a /service-b を分岐。SQSでサービス間を非同期・疎結合にし、障害伝播を防げます。",trap:"Lambda+API Gatewayは同期のみでは疎結合が不十分。ENI直接通信はサービスが密結合になる。モノリスのコード分割だけでは独立デプロイは実現できない。",cmp:[{svc:"ECS+ALB+SQS",feature:"独立デプロイ・疎結合",rto:"スケーラブル",cost:"中",note:"✓ 推奨"},{svc:"Lambda+APIGW",feature:"サーバーレス",rto:"同期中心",cost:"低",note:"非同期設計が別途必要"},{svc:"EC2モノリス",feature:"シンプル",rto:"変更困難",cost:"低",note:"独立デプロイ不可"}],kws:["マイクロサービス","ECS","ALB","パスベースルーティング","疎結合"]},
  {domain:"設計",cat:"サーバーレス",diff:"Medium",q:"APIリクエストを受け取り、重い処理を非同期で実行してS3に結果を保存したい。サーバーレスで最もシンプルな構成は？",opts:["API Gateway → Lambda(同期処理) → S3","API Gateway → Lambda(SQSにエンキュー) → Lambda(ワーカー) → S3","EC2 + SQS + S3","Step Functions → Lambda → S3"],ans:1,why:"API GatewayがリクエストをLambdaへ。LambdaはSQSにメッセージをエンキューしてすぐにレスポンスを返す(202 Accepted)。別のLambdaがSQSをポーリングして重い処理を非同期実行しS3に保存。全てサーバーレスで完結。",trap:"Lambda同期処理は最大15分の制約があり、タイムアウトリスクが高い。Step Functionsは複雑なワークフロー向けで本要件にはオーバースペック。",cmp:[{svc:"APIGW+SQS+Lambda",feature:"非同期・サーバーレス",rto:"シンプル",cost:"低",note:"✓ 推奨"},{svc:"Lambda同期",feature:"シンプル",rto:"15分制限あり",cost:"低",note:"タイムアウトリスク"},{svc:"Step Functions",feature:"ワークフロー管理",rto:"複雑",cost:"中",note:"単純処理にはオーバー"}],kws:["API Gateway","Lambda","SQS","非同期処理","サーバーレス"]},
  {domain:"設計",cat:"HA / DR",diff:"Hard",q:"RTO=4時間、RPO=1時間を要件とするDR戦略で、最もコスト効率が高いのはどれか？",opts:["Multi-Site Active/Active","Warm Standby","Pilot Light","Backup & Restore + S3 Cross-Region Replication"],ans:2,why:"Pilot Lightはコアコンポーネントのみをセカンダリリージョンで常時稼働させ、障害時にスケールアップする。RTO=数十分・RPO=分単位でRTO4時間・RPO1時間の要件を十分に満たしつつ、Warm Standbyより安価。",trap:"Warm StandbyはRTO数分・RPO秒単位でこの要件には過剰投資。Multi-Site Active/ActiveはRTO≈0で最高コスト。Backup&RestoreはRTO時間単位で4時間の要件を満たせないリスクがある。",cmp:[{svc:"Backup & Restore",feature:"RTO: 時間〜",rto:"RPO: 時間〜",cost:"最安",note:"本要件はギリギリ"},{svc:"Pilot Light",feature:"RTO: 数十分",rto:"RPO: 分",cost:"安い",note:"✓ 推奨"},{svc:"Warm Standby",feature:"RTO: 数分",rto:"RPO: 秒",cost:"中",note:"要件に対して過剰"},{svc:"Multi-Site",feature:"RTO: 秒以下",rto:"RPO: ≈0",cost:"最高",note:"明らかに過剰"}],kws:["Pilot Light","RTO","RPO","DR戦略","コスト効率"]},
  {domain:"設計",cat:"Well-Architected",diff:"Medium",q:"Webアプリの可用性を高めるため、ALBの背後にEC2を複数AZに配置した。次に優先すべき設計改善はどれか？",opts:["EC2をより大きなインスタンスタイプに変更","RDSをMulti-AZ構成に変更し、データ層の冗長化を図る","CloudFrontを追加してグローバルに配信","EC2のAMIを週次でバックアップする"],ans:1,why:"EC2をマルチAZにしてもRDSがシングルAZのままではDBが単一障害点になる。RDS Multi-AZで同期レプリケーションとフェイルオーバーを実現し、データ層の冗長化が次の優先事項。",trap:"インスタンスのスケールアップは垂直スケーリングで可用性向上にならない。CloudFrontはパフォーマンス改善であり可用性の根本的な改善ではない。AMIバックアップはRTOを改善しない。",cmp:[{svc:"RDS Multi-AZ",feature:"データ層冗長化",rto:"1〜2分",cost:"約2倍",note:"✓ 次の優先事項"},{svc:"インスタンス拡大",feature:"垂直スケール",rto:"変わらず",cost:"増加",note:"可用性向上なし"},{svc:"CloudFront",feature:"パフォーマンス改善",rto:"変わらず",cost:"低",note:"可用性の根本対策ではない"}],kws:["Multi-AZ","単一障害点","可用性","Well-Architected","冗長化"]},
  {domain:"設計",cat:"イベント駆動",diff:"Medium",q:"S3に画像がアップロードされるたびに自動でサムネイル生成・メタデータ抽出・通知送信の3処理を並列実行したい。最適な構成は？",opts:["S3イベント → Lambda(3処理を順次実行)","S3イベント → SNS → SQS×3 → Lambda×3","S3イベント → EventBridge → Lambda×3(直接並列起動)","S3イベント → Step Functions(順次ステート)"],ans:1,why:"S3イベント→SNSでファンアウトし、各処理用のSQSキューにメッセージを配信。それぞれのLambdaがSQSを独立してポーリングすることで並列実行と疎結合を両立。SQSのDLQでエラー処理も可能。",trap:"Lambda1つで順次実行は処理時間が合計になり効率が悪い。EventBridge→Lambda直接はSQSバッファがなくスパイク時にスロットリングのリスク。Step Functionsは順次実行の設計。",cmp:[{svc:"SNS→SQS→Lambda",feature:"並列・疎結合・バッファ",rto:"スケーラブル",cost:"低",note:"✓ 推奨"},{svc:"Lambda順次",feature:"シンプル",rto:"処理時間が合計",cost:"低",note:"並列効果なし"},{svc:"EventBridge→Lambda",feature:"並列",rto:"バッファなし",cost:"低",note:"スパイク対策が別途必要"}],kws:["SNS","SQS","Lambda","ファンアウト","イベント駆動"]},
  {domain:"設計",cat:"スケーラビリティ",diff:"Hard",q:"グローバルなゲームアプリでプレイヤーのスコアをリアルタイムに集計・表示したい。読み取りが書き込みの100倍多く、レイテンシーは10ms以内が要件。最適なデータ層の構成は？",opts:["RDS MySQL + Read Replica(複数リージョン)","DynamoDB Global Tables + DAX","ElastiCache Redis(Cluster Mode) + RDSバックエンド","Aurora Global DB + Read Replica"],ans:1,why:"DynamoDB Global Tablesはマルチリージョンに自動レプリケーションし書き込みをどこでも受け付ける。DAXがマイクロ秒レベルのインメモリキャッシュを提供し読み取り100倍の要件を満たす。グローバルな低レイテンシー読み取りに最適。",trap:"RDS Read Replicaはリージョン間レプリケーション遅延があり10ms以内は困難。Aurora Global DBはRPO/RTO向けでDAXのようなマイクロ秒キャッシュはない。ElastiCacheだけでは書き込みのグローバル分散が解決しない。",cmp:[{svc:"DynamoDB+DAX",feature:"マイクロ秒読取・グローバル",rto:"スケーラブル",cost:"中",note:"✓ 推奨"},{svc:"RDS+ReadReplica",feature:"リージョン間遅延あり",rto:"管理複雑",cost:"中",note:"10ms要件が困難"},{svc:"Aurora Global",feature:"DR向け",rto:"DAXなし",cost:"高",note:"読取レイテンシー改善限界あり"}],kws:["DynamoDB","DAX","Global Tables","低レイテンシー","グローバル"]},
  {domain:"設計",cat:"API設計",diff:"Medium",q:"外部パートナー向けAPIを公開したい。パートナーごとに使用量を制限し、APIキーで認証、使用状況をモニタリングしたい。最もマネージドな構成は？",opts:["EC2 + Nginx + カスタム認証ロジック","API Gateway(使用量プラン+APIキー) + Lambda + CloudWatch","ALB + Lambda + Cognito","CloudFront + Lambda@Edge + DynamoDB(キー管理)"],ans:1,why:"API Gatewayの使用量プランでパートナーごとのレート制限・クォータを設定。APIキーで認証。CloudWatchでAPI使用状況の自動モニタリングが可能。全てマネージドサービスで運用負担が最小。",trap:"EC2+Nginxはサーバー管理が必要で運用負担が大きい。ALB+Cognitoは使用量プランの概念がなく別途実装が必要。CloudFront+Lambda@Edgeはキー管理の実装が複雑。",cmp:[{svc:"API Gateway",feature:"使用量プラン+APIキー",rto:"フルマネージド",cost:"低",note:"✓ 推奨"},{svc:"EC2+Nginx",feature:"カスタム実装",rto:"柔軟",cost:"低",note:"運用負担大"},{svc:"ALB+Cognito",feature:"認証のみ",rto:"使用量管理が別途必要",cost:"低",note:"クォータ管理なし"}],kws:["API Gateway","使用量プラン","APIキー","レート制限","マネージド"]},
  {domain:"設計",cat:"HA / DR",diff:"Hard",q:"オンプレのActive DirectoryをAWSに移行せず、AWSリソースへのSSOを実現したい。最適な構成は？",opts:["IAMユーザーを全員分作成","AWS IAM Identity Center + AD Connector","Cognito User Pool + Lambda(カスタム認証)","AWS Directory Service for Microsoft AD(フル)"],ans:1,why:"IAM Identity Center(旧AWS SSO)はAD Connectorを通じてオンプレADと連携し、AWSコンソール・CLIへのSSOを実現。既存ADを移行せず使いまわせる。ユーザー管理はオンプレAD側で継続。",trap:"IAMユーザーを全員分作成は管理が煩雑でオンプレADと二重管理になる。AWS Managed Microsoft ADはAWS上に新規ADを構築するため移行が必要。Cognitoはモバイル/Web向けで社内SSO向きではない。",cmp:[{svc:"IAM Identity Center+AD Connector",feature:"既存AD連携・SSO",rto:"移行不要",cost:"低",note:"✓ 推奨"},{svc:"AWS Managed AD",feature:"フルマネージドAD",rto:"移行が必要",cost:"中",note:"オンプレADが不要な場合"},{svc:"IAMユーザー",feature:"シンプル",rto:"管理が煩雑",cost:"無料",note:"二重管理が発生"}],kws:["IAM Identity Center","AD Connector","SSO","Active Directory","フェデレーション"]},
  {domain:"設計",cat:"マルチアカウント",diff:"Hard",q:"100以上のAWSアカウントを管理するエンタープライズ環境で、全アカウントに共通のセキュリティポリシー・請求の一元管理・新規アカウントの自動プロビジョニングを実現したい。最適な構成は？",opts:["各アカウントを独立して管理","AWS Organizations + SCP + AWS Control Tower","AWS Config + Security Hub(全アカウント)","マスターアカウントにIAMロールを集約"],ans:1,why:"AWS OrganizationsでOU階層管理と請求の一元化。SCPで全アカウントへのガードレール適用。Control TowerがLanding Zoneを自動構築し、新規アカウントのプロビジョニングをAccount Factoryで標準化できる。",trap:"各アカウント独立管理は100+では現実的でない。Config+Security Hubは検出・可視化であり予防的コントロールにならない。IAMロール集約のみではOU管理・自動プロビジョニングが実現できない。",cmp:[{svc:"Organizations+Control Tower",feature:"ガードレール+自動化",rto:"スケーラブル",cost:"無料(サービス料別)",note:"✓ 推奨"},{svc:"Config+Security Hub",feature:"検出・可視化",rto:"事後対応",cost:"有料",note:"予防的コントロールなし"},{svc:"手動管理",feature:"シンプル",rto:"スケールしない",cost:"無料",note:"100+では非現実的"}],kws:["Organizations","Control Tower","SCP","Landing Zone","マルチアカウント"]},
  {domain:"設計",cat:"サーバーレス",diff:"Hard",q:"注文処理システムで、注文受付→在庫確認→決済→通知の4ステップを順次実行し、各ステップが失敗した場合はロールバック処理を行いたい。最適な構成は？",opts:["Lambda×4を直列に呼び出し","Step Functions(標準ワークフロー) + Lambda×4 + SQS(エラー通知)","SQS×4のパイプライン","EventBridge + Lambda×4"],ans:1,why:"Step Functions標準ワークフローはステート管理・リトライ・タイムアウトを宣言的に定義でき、各ステートでエラーキャッチとCatchを使ったロールバック処理を実装できる。最大1年の実行時間で長時間の注文処理にも対応。",trap:"Lambda直列呼び出しは途中失敗時のロールバックをコードで実装する必要があり複雑。SQSパイプラインはステート管理が困難。EventBridge→Lambdaはオーケストレーション機能がない。",cmp:[{svc:"Step Functions",feature:"ステート管理・ロールバック",rto:"宣言的定義",cost:"中",note:"✓ 推奨"},{svc:"Lambda直列",feature:"シンプルなコード",rto:"ロールバック実装が複雑",cost:"低",note:"エラー処理が大変"},{svc:"SQSパイプライン",feature:"非同期",rto:"ステート管理困難",cost:"低",note:"順次制御が難しい"}],kws:["Step Functions","ステートマシン","ロールバック","オーケストレーション","サーバーレス"]},
  {domain:"設計",cat:"スケーラビリティ",diff:"Medium",q:"Webアプリのセッション管理をEC2インスタンスのローカルメモリで行っている。Auto Scalingで水平スケールすると、スケールイン時にセッションが失われる問題がある。解決策は？",opts:["スティッキーセッション(ALBセッションアフィニティ)を有効化","ElastiCache(Redis)を外部セッションストアとして使用","EC2インスタンスを増やしてスケールインしない設定にする","RDSにセッションデータを保存"],ans:1,why:"ElastiCache Redisを中央セッションストアにすることで、どのEC2インスタンスがリクエストを処理してもセッションデータを参照できる。スケールイン・アウトに関係なくセッションが維持され、真のステートレスアーキテクチャを実現。",trap:"スティッキーセッションは特定インスタンスにリクエストを固定するため、そのインスタンスが終了するとセッションが失われる。根本解決にならない。RDSはセッションの高頻度読み書きに向かない。",cmp:[{svc:"ElastiCache Redis",feature:"中央セッションストア",rto:"マイクロ秒",cost:"中",note:"✓ 推奨"},{svc:"スティッキーセッション",feature:"設定簡単",rto:"インスタンス終了でロスト",cost:"無料",note:"根本解決にならない"},{svc:"RDS",feature:"永続化",rto:"レイテンシー高",cost:"中",note:"セッション頻度に不向き"}],kws:["ElastiCache","セッション管理","ステートレス","Auto Scaling","スティッキーセッション"]},
  {domain:"設計",cat:"Well-Architected",diff:"Medium",q:"本番環境へのデプロイ時に、一部ユーザー(5%)だけに新バージョンを試してリスクを最小化したい。Route 53を使った最適な手法は？",opts:["ブルーグリーンデプロイ(完全切り替え)","Route 53加重ルーティング(旧95%:新5%)","カナリアデプロイ(CodeDeploy)","フィーチャーフラグでアプリ内制御"],ans:1,why:"Route 53の加重ルーティングで旧バージョンのALBに95%、新バージョンのALBに5%のトラフィックを振り分ける。問題があれば加重を0%に戻すだけで即時ロールバック可能。インフラレベルのカナリアリリースを実現。",trap:"ブルーグリーンは完全切り替えなので5%制御ができない。CodeDeployのカナリアはEC2/ECS/Lambdaに限定で要件次第。フィーチャーフラグはアプリ改修が必要。",cmp:[{svc:"Route 53加重ルーティング",feature:"トラフィック比率を柔軟制御",rto:"即時ロールバック",cost:"低",note:"✓ 推奨"},{svc:"ブルーグリーン",feature:"完全切り替え",rto:"ロールバック可",cost:"中(2環境維持)",note:"5%制御できない"},{svc:"CodeDeployカナリア",feature:"デプロイ自動化",rto:"対象サービスに限定",cost:"低",note:"インフラ依存"}],kws:["Route 53","加重ルーティング","カナリアリリース","ブルーグリーン","デプロイ戦略"]},
  {domain:"設計",cat:"耐障害性",diff:"Hard",q:"Lambdaで外部APIを呼び出す処理がある。外部API障害時にLambdaが大量にリトライして課金が爆発することを防ぎたい。最も適切な対策は？",opts:["Lambdaのタイムアウトを短くする","SQSのデッドレターキュー + Exponential Backoff + Lambda同時実行数の制限","CloudWatchアラームで手動対応","外部APIの障害通知を受けて手動でLambdaを無効化"],ans:1,why:"SQSのDLQで処理失敗メッセージを隔離しリトライ暴走を防ぐ。Exponential Backoffでリトライ間隔を指数的に延ばし外部API回復を待つ。Lambda Reserved Concurrencyで同時実行数を制限し課金上限を設定できる。",trap:"タイムアウトを短くするだけではリトライ回数は減らない。手動対応では障害発生〜対応までの課金リスクが残る。CloudWatchアラームは検出できるが自動抑制はできない。",cmp:[{svc:"SQS DLQ+Backoff+制限",feature:"自動抑制・課金保護",rto:"自動化",cost:"低",note:"✓ 推奨"},{svc:"タイムアウト短縮",feature:"シンプル",rto:"効果限定的",cost:"無料",note:"リトライ数は減らない"},{svc:"手動対応",feature:"確実",rto:"対応遅延リスク",cost:"無料",note:"24h対応が必要"}],kws:["DLQ","Exponential Backoff","Reserved Concurrency","耐障害性","サーキットブレーカー"]},
  {domain:"データ",cat:"データ設計",diff:"Medium",q:"IoTデバイス10万台からのセンサーデータ(秒間50万レコード)をリアルタイムに取り込み、異常検知Lambdaで処理したい。最適な取り込みサービスは？",opts:["SQS Standard Queue → Lambda","Kinesis Data Streams → Lambda (拡張ファンアウト)","SNS → SQS → Lambda","API Gateway → Lambda直接呼び出し"],ans:1,why:"Kinesis Data Streamsはシャード単位でスループットを線形スケール。拡張ファンアウトで複数Lambdaコンシューマーが独立した帯域で並列処理可能。秒間50万レコードには50シャード程度で対応できます。",trap:"SQSはFIFO Queueでも300 TPS/秒程度で、秒間50万レコードには対応困難。API Gatewayのバーストリミット(10,000 req/s)でも不足。",cmp:[{svc:"Kinesis DS",feature:"数MB/s〜GB/s",rto:"シャード拡張",cost:"中",note:"✓ 推奨"},{svc:"SQS",feature:"数千〜数万 msg/s",rto:"スケーラブル",cost:"低",note:"高スループット制約"},{svc:"MSK (Kafka)",feature:"数GB/s",rto:"大規模",cost:"高",note:"超大規模IoT向け"}],kws:["Kinesis Data Streams","拡張ファンアウト","シャード","IoT","高スループット"]},
  {domain:"データ",cat:"データウェアハウス",diff:"Medium",q:"S3に蓄積された数年分のログデータ(ペタバイト規模)に対して、複雑なJOINを含むSQLクエリを高速に実行したい。最適なサービスは？",opts:["AthenaでS3を直接クエリ","Redshift + Redshift Spectrum","DynamoDBに全データをインポート","RDS Aurora(大型インスタンス)"],ans:1,why:"RedshiftはMPP(大規模並列処理)の列指向DWHで複雑なJOINや集計クエリを高速実行できる。Redshift Spectrumを使えばS3のデータをRedshiftから直接クエリでき、全データをRedshiftにロードせずコストを抑えられる。",trap:"AthenaはシンプルなアドホッククエリやS3クエリには向くが、複雑なJOINや繰り返しクエリはRedshiftの方が高速。DynamoDBはKVストアで複雑なSQL JOINは非対応。Aurora大型インスタンスはOLTP向けでDWHには非効率。",cmp:[{svc:"Redshift+Spectrum",feature:"MPP+S3直接クエリ",rto:"複雑なSQL高速",cost:"中〜高",note:"✓ 推奨"},{svc:"Athena",feature:"サーバーレスSQL on S3",rto:"シンプルクエリ向け",cost:"クエリ量従量",note:"複雑なJOINは遅い"},{svc:"Aurora大型",feature:"OLTP高速",rto:"OLAP向きでない",cost:"高",note:"DWHには不向き"}],kws:["Redshift","Redshift Spectrum","MPP","DWH","複雑なSQL"]},
  {domain:"データ",cat:"ETL",diff:"Medium",q:"S3に保存された様々な形式(CSV・JSON・Parquet)のデータを変換してRedshiftにロードするETLパイプラインを構築したい。サーバーレスで管理負担を最小化したい。最適なサービスは？",opts:["EC2上にPythonスクリプトを配置","AWS Glue(ETLジョブ)","Lambda(変換処理)","Kinesis Firehose"],ans:1,why:"GlueはサーバーレスのETLサービスで、データカタログによるスキーマ管理・PySpark/Python Shellジョブによる変換・スケジュール実行をフルマネージドで提供する。様々な形式のデータ変換とRedshiftへのロードを自動化できる。",trap:"EC2はサーバー管理が必要。LambdaはETLジョブとして使えるが最大15分の制限があり大量データ処理には向かない。Firehoseはリアルタイム配信に特化しており複雑な変換ロジックの実装が制限される。",cmp:[{svc:"AWS Glue",feature:"サーバーレスETL・スケジュール",rto:"フルマネージド",cost:"DPU単位",note:"✓ 推奨"},{svc:"Lambda",feature:"シンプルな変換",rto:"15分制限",cost:"リクエスト単位",note:"大量データに不向き"},{svc:"EC2+Python",feature:"フル制御",rto:"管理が必要",cost:"固定費",note:"管理負担あり"}],kws:["AWS Glue","ETL","データカタログ","PySpark","サーバーレス"]},
  {domain:"データ",cat:"データベース設計",diff:"Hard",q:"EC2ベースのMySQLをAmazon RDSに移行後、読み取りパフォーマンスが不足している。READ QPS(毎秒クエリ数)を10倍に向上させたい。最適な方法は？",opts:["RDSインスタンスをより大きなサイズに変更(スケールアップ)","RDS Read Replicaを複数作成してアプリの読み取りを分散","Multi-AZに変更する","Aurora Serverlessに移行する"],ans:1,why:"RDS Read Replicaは読み取りトラフィックをプライマリから分離しスケールアウトする。複数のレプリカを作成してアプリ側でロードバランシングすることでREAD QPSを線形に増やせる。最大5台のRead Replicaを作成可能。",trap:"スケールアップは垂直スケールで上限があり10倍の向上は困難な場合が多い。Multi-AZはフェイルオーバー用で読み取りのスケールアウトではない(読み取りできるのはプライマリのみ)。Aurora Serverlessはスケールするが設定が別途必要。",cmp:[{svc:"Read Replica",feature:"読み取り水平スケール",rto:"最大5台",cost:"追加インスタンス料金",note:"✓ 推奨"},{svc:"スケールアップ",feature:"垂直スケール",rto:"上限あり",cost:"増加",note:"10倍は困難"},{svc:"Multi-AZ",feature:"HA・フェイルオーバー",rto:"読み取りスケールではない",cost:"約2倍",note:"目的が異なる"}],kws:["RDS Read Replica","読み取りスケール","QPS","水平スケール","プライマリ"]},
  {domain:"データ",cat:"データストリーミング",diff:"Hard",q:"Kinesis Data Streamsのシャード数が固定されているため、トラフィックの急増時にスロットリングが発生している。最も適切な対策は？",opts:["Kinesis Firehoseに切り替える","Kinesis Data Streams のシャード数をUpdateShardCount APIで増加(リシャーディング)","SQSに切り替える","Lambda同時実行数を増やす"],ans:1,why:"UpdateShardCount APIでシャード数を増加(スケールアウト)することでスループットを線形に向上できる。シャードを2倍にするとスループットも2倍になる。増加後は新しいシャードに均等にデータが分散される。",trap:"Firehoseはストリーム処理のコントロールが少なくスロットリング解決には向かない。SQS切り替えは既存のKinesis処理ロジックの書き直しが必要。Lambda同時実行数増加はコンシューマー側の問題でシャード不足には対処できない。",cmp:[{svc:"リシャーディング",feature:"スループット線形向上",rto:"API呼び出しのみ",cost:"シャード数×料金",note:"✓ 推奨"},{svc:"Firehose",feature:"配信特化",rto:"ストリーム処理の制御が減る",cost:"量従量",note:"要件が異なる"},{svc:"SQS",feature:"シンプルなキュー",rto:"書き直しが必要",cost:"低",note:"Kinesisの特性を失う"}],kws:["Kinesis","リシャーディング","UpdateShardCount","スロットリング","スケールアウト"]},
  {domain:"データ",cat:"データ分析",diff:"Medium",q:"マーケティングチームがコードを書かずにS3のデータをビジュアライズしてダッシュボードを作りたい。最適なサービスは？",opts:["AthenaのSQLを手動実行","Amazon QuickSight","Redshiftのクエリエディタ","GlueのData Catalog確認"],ans:1,why:"QuickSightはノーコード・ローコードのBIサービス。S3・Athena・Redshift・RDS等に接続してドラッグ&ドロップでグラフ・ダッシュボードを作成できる。SPICEエンジンで高速なデータ取得が可能。非エンジニアでも使える。",trap:"AthenaはSQLが必要でマーケティングチームには敷居が高い。Redshiftクエリエディタもコード記述が必要。Glue Data CatalogはメタデータカタログでBIツールではない。",cmp:[{svc:"QuickSight",feature:"ノーコードBIダッシュボード",rto:"ドラッグ&ドロップ",cost:"ユーザー単位",note:"✓ 推奨"},{svc:"Athena",feature:"SQL分析",rto:"SQL知識が必要",cost:"クエリ量従量",note:"エンジニア向け"},{svc:"Tableau/PowerBI",feature:"高機能BI",rto:"別途ライセンス",cost:"高",note:"AWS統合は別途設定"}],kws:["QuickSight","BI","ダッシュボード","ノーコード","SPICE"]},
  {domain:"データ",cat:"データベース設計",diff:"Medium",q:"ユーザーのセッションデータ(有効期限あり)を高速に読み書きしたい。期限切れデータは自動削除したい。最適なデータベースの選択は？",opts:["RDS MySQL","DynamoDB + TTL(Time To Live)","ElastiCache Redisのみ","S3 + Lifecycle"],ans:1,why:"DynamoDBはサーバーレスで低レイテンシーの読み書きが可能。TTL属性に有効期限を設定するとDynamoDBが自動的に期限切れアイテムをバックグラウンドで削除する。スケールに応じて自動的に容量が調整されセッション管理に最適。",trap:"RDS MySQLはセッションの高頻度読み書きに向かずTTLのような自動削除機能がない。ElastiCacheのみではデータの永続化が保証されない(インメモリのためリスタート時に消える)。S3はオブジェクトストレージで高頻度の小さいデータの読み書きには向かない。",cmp:[{svc:"DynamoDB+TTL",feature:"低レイテンシー+自動削除",rto:"マイクロ秒",cost:"従量課金",note:"✓ 推奨"},{svc:"ElastiCache Redis",feature:"インメモリ高速",rto:"マイクロ秒",cost:"インスタンス料金",note:"永続化保証なし"},{svc:"RDS MySQL",feature:"ACID準拠",rto:"ms単位",cost:"インスタンス料金",note:"高頻度セッションに不向き"}],kws:["DynamoDB","TTL","セッション管理","自動削除","低レイテンシー"]},
  {domain:"データ",cat:"データレイク",diff:"Hard",q:"複数のソース(RDS・S3・DynamoDB)からデータを収集してデータレイクを構築したい。データのカタログ化・アクセス制御・ETLを一元管理したい。最適なサービスの組み合わせは？",opts:["全データをS3にコピーしてAthenaでクエリ","AWS Lake Formation + Glue Data Catalog + Glue ETL","Redshiftにデータを集約","EMRでHadoopクラスターを構築"],ans:1,why:"Lake FormationはS3ベースのデータレイクの構築・管理・セキュリティを統合管理する。Glue Data Catalogでテーブル・スキーマを一元管理。Glue ETLで各ソースからのデータ取り込みを自動化。Lake Formationの列レベルのアクセス制御で細かい権限管理が可能。",trap:"S3+Athenaだけではアクセス制御・カタログ管理が不十分。Redshift集約は全データを移動するコストが高い。EMR Hadoopはマネージドではなくクラスター管理が必要。",cmp:[{svc:"Lake Formation+Glue",feature:"一元管理・列レベルACL",rto:"フルマネージド",cost:"中",note:"✓ 推奨"},{svc:"S3+Athena",feature:"シンプル",rto:"アクセス制御が粗い",cost:"低",note:"カタログ管理が手動"},{svc:"Redshift",feature:"高速SQL",rto:"全データ移動が必要",cost:"高",note:"データレイクとは異なる"}],kws:["Lake Formation","Glue Data Catalog","データレイク","列レベルACL","一元管理"]},
  {domain:"データ",cat:"キャッシュ設計",diff:"Medium",q:"RDSへの読み取りクエリが多く、同じクエリが繰り返し実行されている。ElastiCacheでキャッシュを実装する際、最もシンプルなキャッシュ戦略はどれか？",opts:["Write-Through(書き込み時にキャッシュ更新)","Lazy Loading(Cache-Aside:キャッシュミス時にDBから取得してキャッシュ)","Read-Through","Write-Behind"],ans:1,why:"Lazy Loadingはアプリがキャッシュをチェック→ミスならDBから取得してキャッシュに保存するパターン。実際にアクセスされるデータのみキャッシュするため効率的。実装がシンプルでほとんどのフレームワークが対応している。",trap:"Write-Throughは書き込み時に常にキャッシュを更新するため、読まれないデータもキャッシュされメモリの無駄になる場合がある。Read-ThroughはキャッシュがDB取得を担うためライブラリ依存。Write-Behindは非同期書き込みでデータ損失リスクがある。",cmp:[{svc:"Lazy Loading",feature:"アクセス時のみキャッシュ",rto:"実装シンプル",cost:"効率的なメモリ使用",note:"✓ 推奨"},{svc:"Write-Through",feature:"常に最新状態",rto:"全データがキャッシュに",cost:"メモリ無駄が多い",note:"読まれないデータもキャッシュ"},{svc:"Write-Behind",feature:"書き込み高速",rto:"データ損失リスク",cost:"複雑",note:"障害時にデータが失われる可能性"}],kws:["ElastiCache","Lazy Loading","Cache-Aside","キャッシュ戦略","Write-Through"]},
