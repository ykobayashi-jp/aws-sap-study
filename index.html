  {domain:"データ",cat:"データ分析",diff:"Hard",q:"機械学習モデルのトレーニングデータがS3に格納されている。データの前処理・特徴量エンジニアリング・モデルトレーニング・デプロイを一元管理したい。最適なサービスは？",opts:["EC2上でJupyter Notebookを手動実行","Amazon SageMaker(Studio + Pipelines + Endpoint)","Glue + Lambda + EC2の組み合わせ","EMR + Spark MLlib"],ans:1,why:"SageMaker Studioは機械学習のIDEとしてデータ探索・前処理・モデル開発を一元管理。SageMaker Pipelinesで前処理→トレーニング→評価→デプロイのMLパイプラインを自動化。SageMaker Endpointでリアルタイム推論を提供。",trap:"EC2手動実行はスケールせず再現性が低い。Glue+Lambda+EC2の組み合わせはML特化機能がなく自分で構築する範囲が広い。EMR+SparkはMLライブラリが使えるがSageMakerのフルマネージドMLプラットフォームとしての統合性は低い。",cmp:[{svc:"SageMaker",feature:"MLライフサイクル全体を一元管理",rto:"フルマネージド",cost:"利用量従量",note:"✓ 推奨"},{svc:"EC2+Jupyter",feature:"フル制御",rto:"手動管理",cost:"EC2料金",note:"再現性・スケールに課題"},{svc:"EMR+Spark",feature:"大規模分散処理",rto:"ML特化機能なし",cost:"中",note:"SageMakerより手動実装が多い"}],kws:["SageMaker","MLパイプライン","機械学習","Studio","Endpoint"]},
  {domain:"監視",cat:"CloudWatch",diff:"Medium",q:"EC2インスタンスのメモリ使用率とディスク使用率をCloudWatchで監視したい。デフォルトのCloudWatchメトリクスに含まれないこれらを収集するには？",opts:["CloudWatch単体でデフォルト収集される","CloudWatch Agentをインストールしてカスタムメトリクスを送信","CloudTrailで収集する","Systems Manager Session Managerで確認"],ans:1,why:"デフォルトのCloudWatchメトリクスにはCPU・ネットワーク・ディスクI/O等は含まれるが、メモリ使用率とディスク使用率はOSレベルの情報のため含まれない。CloudWatch AgentをインストールすることでこれらのカスタムメトリクスをCloudWatchに送信できる。",trap:"デフォルトのCloudWatchにはメモリとディスク使用率が含まれない。CloudTrailはAPIコールの記録でメトリクス収集ではない。Session Managerはリモートアクセスで監視ツールではない。",cmp:[{svc:"CloudWatch Agent",feature:"OS内部メトリクス収集",rto:"インストール後すぐ",cost:"カスタムメトリクス料金",note:"✓ 推奨"},{svc:"デフォルトCW",feature:"インフラ基本メトリクス",rto:"設定不要",cost:"無料",note:"メモリ・ディスク使用率は非対応"},{svc:"CloudTrail",feature:"API操作ログ",rto:"メトリクスではない",cost:"低",note:"目的が異なる"}],kws:["CloudWatch Agent","カスタムメトリクス","メモリ使用率","ディスク使用率","OS内部監視"]},
  {domain:"監視",cat:"ログ管理",diff:"Medium",q:"Lambdaの本番障害が発生した際に原因を迅速に調査したい。Lambda実行ログからエラーパターンを自動検出してアラートする構成は？",opts:["CloudWatch Logsを手動で確認","CloudWatch Logs Insights + メトリクスフィルター + CloudWatch Alarm + SNS","X-Rayのみ使用","Lambda関数内でSNS通知を実装"],ans:1,why:"CloudWatch Logsにエラーパターン(ERROR・Exception等)のメトリクスフィルターを作成してカスタムメトリクスを生成。そのメトリクスに対してCloudWatch Alarmを設定しSNSで通知。Logs Insightsでログを素早く検索・分析できる。",trap:"手動確認は障害対応が遅くなる。X-Rayはトレーシングで原因特定に有効だがアラートは出さない。Lambda内でのSNS実装はLambdaのエラーがSNSに届かない場合がある。",cmp:[{svc:"Logs Insights+フィルター+Alarm",feature:"自動検出・アラート・分析",rto:"リアルタイム通知",cost:"低",note:"✓ 推奨"},{svc:"X-Ray",feature:"トレーシング・ボトルネック特定",rto:"事後分析向け",cost:"低",note:"アラート機能なし"},{svc:"手動確認",feature:"詳細を見られる",rto:"対応が遅くなる",cost:"無料",note:"自動化されていない"}],kws:["CloudWatch Logs Insights","メトリクスフィルター","CloudWatch Alarm","Lambda","エラー検出"]},
  {domain:"監視",cat:"分散トレーシング",diff:"Medium",q:"マイクロサービスアーキテクチャで、API Gatewayからの1つのリクエストが複数のLambdaとDynamoDBを経由している。エンドツーエンドのレイテンシーとボトルネックを特定したい。最適なサービスは？",opts:["CloudWatch Logsで各サービスのログを確認","AWS X-Ray","CloudTrailで全APIコールを確認","CloudWatch ContainerInsights"],ans:1,why:"X-Rayは分散トレーシングサービスで、API Gateway→Lambda→DynamoDBの一連のリクエストをトレースIDで追跡できる。各サービスのレイテンシーをサービスマップで可視化し、ボトルネックを素早く特定できる。",trap:"CloudWatch Logsは各サービスのログが分散していてリクエストの全体像が見えにくい。CloudTrailはAPI操作の記録でパフォーマンス分析には向かない。ContainerInsightsはECS/EKSのコンテナ監視でLambdaには主要でない。",cmp:[{svc:"X-Ray",feature:"エンドツーエンドトレーシング",rto:"サービスマップで可視化",cost:"トレース量従量",note:"✓ 推奨"},{svc:"CloudWatch Logs",feature:"各サービスのログ",rto:"手動での突き合わせが必要",cost:"低",note:"全体像が見えにくい"},{svc:"CloudTrail",feature:"API操作記録",rto:"パフォーマンス分析不向き",cost:"低",note:"目的が異なる"}],kws:["X-Ray","分散トレーシング","サービスマップ","ボトルネック","マイクロサービス"]},
  {domain:"監視",cat:"自動修復",diff:"Hard",q:"EC2インスタンスが特定のシステムチェックで失敗した場合に自動で再起動させ、再起動しても解決しない場合はSNSで通知したい。最適な構成は？",opts:["手動で監視して再起動","CloudWatch Alarm + EC2アクションで自動回復(recover) + SNS通知","Lambda + CloudWatch Events","Systems Manager Automation"],ans:1,why:"CloudWatch AlarmのEC2アクション「回復(recover)」はシステムチェック失敗を検出するとEC2インスタンスを自動的に別のハードウェアで再起動する。アラーム状態が継続する場合はSNSトピックに通知するアクションも設定できる。",trap:"手動監視は24h対応が必要。Lambda+CloudWatch Eventsは自分で実装が必要。Systems Managerはより複雑なシナリオ向けで単純な回復には過剰。",cmp:[{svc:"CW Alarm+EC2アクション",feature:"自動回復+通知",rto:"EC2アクションで自動",cost:"無料",note:"✓ 推奨"},{svc:"Lambda+Events",feature:"カスタム自動化",rto:"実装コストあり",cost:"低",note:"単純な回復には過剰"},{svc:"Systems Manager",feature:"複雑な修復シナリオ",rto:"設定複雑",cost:"低",note:"この要件にはオーバースペック"}],kws:["CloudWatch Alarm","EC2自動回復","システムチェック","recover","SNS通知"]},
  {domain:"監視",cat:"コスト監視",diff:"Medium",q:"AWSの月額コストが予算を超えそうになった際に事前にアラートを受け取りたい。さらにコストが大幅超過した場合はLambdaで自動的にリソースを停止させたい。最適な構成は？",opts:["毎月手動でコストを確認","AWS Budgets + SNS(通知) + Lambda(自動停止)","Cost Explorerのみ設定","CloudWatchのカスタムメトリクスでコスト監視"],ans:1,why:"AWS Budgetsは予算の閾値(80%・100%等)でSNS通知を設定できる。SNSはLambdaをサブスクライバとして設定することで、予算超過時にLambdaが自動実行されリソースを停止・削減できる。予防的なコスト管理を自動化できる。",trap:"手動確認は超過後の発見になり手遅れになることがある。Cost Explorerは分析ツールでアラートや自動化機能はない。CloudWatchのカスタムメトリクスでのコスト監視は設定が複雑でBudgetsの方が適切。",cmp:[{svc:"AWS Budgets+SNS+Lambda",feature:"予防的アラート+自動停止",rto:"閾値超過で即通知",cost:"Budgets無料(高機能有料)",note:"✓ 推奨"},{svc:"Cost Explorer",feature:"コスト分析・予測",rto:"事後分析",cost:"無料〜",note:"アラート・自動化なし"},{svc:"手動確認",feature:"詳細確認可能",rto:"発見が遅い",cost:"無料",note:"自動化できない"}],kws:["AWS Budgets","コスト予算","SNS","Lambda","自動停止"]},
  {domain:"監視",cat:"セキュリティ監視",diff:"Hard",q:"AWSアカウントでrootユーザーのAPIコール、MFAなしのコンソールログイン、大量のIAMポリシー変更を検出してリアルタイムにアラートしたい。最適な構成は？",opts:["毎日CloudTrailログを手動確認","CloudTrail + CloudWatch Logsメトリクスフィルター + CloudWatch Alarm + SNS","GuardDutyのみ有効化","Config Rulesで検出"],ans:1,why:"CloudTrailがAPI操作を記録。CloudWatch Logsメトリクスフィルターで特定パターン(root使用・MFAなしログイン・IAM変更)を検出してカスタムメトリクスを生成。CloudWatch AlarmがSNSに通知する。CISベンチマーク推奨の構成。",trap:"手動確認は検出が遅く見落としリスクがある。GuardDutyは主に脅威行動の機械学習検出で特定のAPIコールパターンのリアルタイムアラートにはメトリクスフィルターが適切。Config Rulesはリソース設定の評価でAPIコールの即時検出には向かない。",cmp:[{svc:"CloudTrail+CWフィルター+Alarm",feature:"特定イベントのリアルタイム検出",rto:"即時通知",cost:"低",note:"✓ 推奨(CISベンチマーク推奨)"},{svc:"GuardDuty",feature:"機械学習による脅威検出",rto:"脅威行動の検出",cost:"有料",note:"特定APIコールの即時検出には補完的"},{svc:"Config Rules",feature:"設定評価",rto:"イベント検出ではない",cost:"有料",note:"目的が異なる"}],kws:["CloudTrail","メトリクスフィルター","CISベンチマーク","rootユーザー","セキュリティ監視"]},
  {domain:"監視",cat:"アプリケーション監視",diff:"Medium",q:"本番ECSサービスのCPU・メモリ使用率、タスク数、ALBのリクエスト数・レスポンスタイムを一画面で監視したい。最適な構成は？",opts:["各メトリクスを別々のコンソールで確認","CloudWatch ダッシュボードに複数のウィジェットを追加","X-Rayサービスマップで確認","ECSコンソールのメトリクスタブのみ確認"],ans:1,why:"CloudWatch ダッシュボードは複数のAWSサービスのメトリクスをカスタムウィジェット(グラフ・数値・アラームステータス)として一画面に集約できる。ECS・ALB・EC2等のメトリクスを横断的に可視化でき、チームで共有するオペレーションビューとして最適。",trap:"別々のコンソール確認は状況把握に時間がかかる。X-Rayはトレーシングでメトリクスダッシュボードではない。ECSコンソールはECSのみに限定されALBのメトリクスは別途確認が必要。",cmp:[{svc:"CloudWatchダッシュボード",feature:"複数サービスを一画面に集約",rto:"カスタム可能",cost:"ダッシュボード料金",note:"✓ 推奨"},{svc:"X-Ray",feature:"トレーシング可視化",rto:"メトリクスダッシュボードではない",cost:"低",note:"目的が異なる"},{svc:"ECSコンソール",feature:"ECS特化",rto:"ALB等が別途必要",cost:"無料",note:"横断的可視化が困難"}],kws:["CloudWatchダッシュボード","カスタムウィジェット","ECS","ALB","オペレーション"]},
  {domain:"監視",cat:"インフラ監視",diff:"Hard",q:"Systems Manager Patch Managerを使って100台のEC2インスタンスに月次パッチを適用したい。パッチ適用後に失敗したインスタンスをレポートしたい。最適な構成は？",opts:["各EC2に手動でSSHしてパッチ適用","Patch Manager + Maintenance Window + SNS通知 + Systems Manager Compliance","CloudWatch EventsでLambdaを起動してパッチ適用","AWS Configでパッチ状態を監視"],ans:1,why:"Patch ManagerはSSMエージェント経由で複数EC2に一括パッチ適用。Maintenance Windowでパッチ適用のスケジュール(月次等)を定義。パッチ適用完了後にSNS通知。Systems Manager Complianceでパッチの適用状況を一覧表示しコンプライアンスレポートを生成できる。",trap:"手動SSH対応は100台では現実的でない。Lambda+CloudWatch Eventsは自分でパッチロジックを実装する必要がある。Config Rulesはパッチ状態の確認はできるが適用の自動化機能がない。",cmp:[{svc:"Patch Manager+Maintenance Window",feature:"スケジュール一括適用+レポート",rto:"完全自動化",cost:"無料",note:"✓ 推奨"},{svc:"手動SSH",feature:"完全なコントロール",rto:"100台では非現実的",cost:"無料",note:"スケールしない"},{svc:"Config+パッチルール",feature:"準拠状態の可視化",rto:"自動適用機能なし",cost:"有料",note:"検出のみ"}],kws:["Patch Manager","Maintenance Window","Systems Manager","パッチ管理","コンプライアンス"]},
  {domain:"監視",cat:"ログ分析",diff:"Medium",q:"ALBのアクセスログをS3に保存している。特定のエラーコード(5xx)が急増したIPアドレスを素早く特定したい。最もコスト効率の高い分析方法は？",opts:["S3のログファイルを手動でダウンロードしてgrepで確認","Athena + S3でSQLクエリを実行","Redshiftにログをロードして分析","ElasticSearchクラスターを構築"],ans:1,why:"AthenaはS3上のログファイルをSQLで直接クエリできる。ログをS3から移動する必要がなく、クエリしたデータ量のみ課金。ALBアクセスログのパーティショニング設定でコストをさらに削減できる。素早いアドホック分析に最適。",trap:"手動grepは大量ログでは時間がかかりすぎる。Redshiftへのロードはコストと時間が追加でかかる。ElasticSearchはリアルタイム検索に優れるが今回の要件にはコストが過剰。",cmp:[{svc:"Athena+S3",feature:"SQL on S3・ログ移動不要",rto:"すぐにクエリ可能",cost:"スキャンデータ量のみ",note:"✓ 推奨"},{svc:"Redshift",feature:"高速複雑SQL",rto:"ロードに時間",cost:"インスタンス料金",note:"アドホック分析には過剰"},{svc:"手動grep",feature:"追加サービス不要",rto:"大量ログでは遅い",cost:"無料",note:"スケールしない"}],kws:["Athena","ALBアクセスログ","S3","アドホック分析","コスト効率"]},
  {domain:"監視",cat:"Service Health",diff:"Medium",q:"AWSのサービス障害が発生した際に、自社が利用しているサービス・リージョンへの影響を即座に把握し担当者に通知したい。最適な構成は？",opts:["AWSステータスページを手動で確認","AWS Health Dashboard(Personal Health Dashboard) + EventBridge + SNS","CloudWatchアラームで監視","Trusted Advisorで確認"],ans:1,why:"Personal Health Dashboard(AWS Health)は自分のアカウントが使っているサービス・リージョンに関連する障害・メンテナンス情報を表示する。EventBridgeでHealth Eventをキャプチャして自動的にSNSで担当者に通知できる。",trap:"AWSステータスページは全サービスの状態で自分への影響が分かりにくく手動確認が必要。CloudWatchは自分のリソースの監視でAWSサービス障害の検出には向かない。Trusted AdvisorはAWSのベストプラクティス確認ツールで障害通知機能はない。",cmp:[{svc:"AWS Health+EventBridge+SNS",feature:"個人影響の自動通知",rto:"障害発生時に即通知",cost:"無料",note:"✓ 推奨"},{svc:"AWSステータスページ",feature:"全サービスの状態",rto:"手動確認が必要",cost:"無料",note:"自分への影響が分かりにくい"},{svc:"Trusted Advisor",feature:"ベストプラクティス確認",rto:"障害通知機能なし",cost:"有料(一部無料)",note:"目的が異なる"}],kws:["AWS Health","Personal Health Dashboard","EventBridge","サービス障害","自動通知"]},
  {domain:"監視",cat:"運用",diff:"Medium",q:"本番環境のEC2インスタンスに緊急でコマンドを実行したい。SSHキーがなく踏み台サーバーもない。安全かつ迅速にアクセスする方法は？",opts:["新しいSSHキーを生成してEC2に設定","Systems Manager Session Manager","EC2シリアルコンソール","新しい踏み台EC2を立ち上げてアクセス"],ans:1,why:"Session ManagerはSSMエージェント経由でSSHキー・踏み台・インバウンドポート開放なしにEC2にアクセスできる。セッションログがCloudWatch Logs/S3に自動記録され監査証跡も残る。IAMポリシーでアクセス制御も可能。",trap:"SSHキー生成は既存インスタンスへの追加設定が必要で時間がかかる。EC2シリアルコンソールは緊急時に有効だが通常のコマンド実行には向かない。踏み台EC2の立ち上げは時間がかかり緊急時の要件に合わない。",cmp:[{svc:"Session Manager",feature:"SSHキー不要・監査ログ",rto:"即座にアクセス可能",cost:"無料",note:"✓ 推奨"},{svc:"SSHキー",feature:"従来型",rto:"事前設定が必要",cost:"無料",note:"キーがない場合は再設定が必要"},{svc:"踏み台EC2",feature:"汎用性高い",rto:"立ち上げに時間",cost:"EC2料金",note:"緊急時には遅い"}],kws:["Session Manager","Systems Manager","踏み台不要","SSHキー不要","監査ログ"]},
  {domain:"セキュリティ",cat:"暗号化 / KMS",diff:"Hard",q:"FIPS 140-2 Level 3準拠のHSMが必要な金融規制要件と、既存アプリからの透過的な暗号化処理を両立したい。最適なアーキテクチャは？",opts:["AWS KMS (マネージド)","AWS CloudHSM + KMSカスタムキーストア","AWS CloudHSM単体","Client-side encryption + S3 SSE-KMS"],ans:1,why:"CloudHSMはFIPS 140-2 Level 3認定の専有ハードウェアを提供。KMSカスタムキーストアと統合することで、既存のKMS APIを変更なく利用しつつHSMでキー管理を行えます。",trap:"AWS KMS標準はFIPS 140-2 Level 2(一部Level 3)で、Level 3が必須の場合は不十分。CloudHSM単体ではKMS APIが使えず既存アプリの変更が大きい。",cmp:[{svc:"KMS (標準)",feature:"FIPS L2〜L3",rto:"フルマネージド",cost:"低",note:"通常用途"},{svc:"CloudHSM+KMS",feature:"FIPS L3",rto:"専有HSM",cost:"高",note:"✓ 金融規制向け"},{svc:"CloudHSM単体",feature:"FIPS L3",rto:"専有HSM",cost:"高",note:"KMS API利用不可"}],kws:["CloudHSM","KMSカスタムキーストア","FIPS 140-2","専有ハードウェア","透過的暗号化"]},
  {domain:"移行",cat:"Migration",diff:"Hard",q:"オンプレの大規模Hadoopクラスタ(毎日5TB処理)をAWSへ移行。既存のHive/SparkジョブをできるだけそのままAWSで実行したい。最適なサービスは？",opts:["AWS Glue (サーバーレスSpark)","Amazon EMR (EC2またはEKS上)","Amazon Athena","AWS Batch + Fargate"],ans:1,why:"EMRはHadoop/Spark/Hiveを完全サポートし、既存ジョブをほぼそのまま移植可能。EMR on EKSはKubernetes上でSparkを実行でき、EC2 Spot活用でコスト削減も実現。",trap:"AWS Glueは変換ジョブ向けサーバーレスSparkだが、複雑なHadoopエコシステムの移植には制約がある。AthenaはS3上のSQLクエリのみでバッチ処理パイプラインには不向き。",cmp:[{svc:"EMR",feature:"Hadoop/Spark互換",rto:"フル制御",cost:"中〜高",note:"✓ 移植性最高"},{svc:"Glue",feature:"サーバーレスSpark",rto:"サーバーレス",cost:"中",note:"シンプルETL向け"},{svc:"Athena",feature:"SQL on S3",rto:"サーバーレス",cost:"低",note:"クエリのみ"}],kws:["EMR","Hadoop互換","Spark","Hive","リフト&シフト"]},
  {domain:"データ",cat:"データ設計",diff:"Medium",q:"IoTデバイス10万台からのセンサーデータ(秒間50万レコード)をリアルタイムに取り込み、異常検知Lambdaで処理したい。最適な取り込みサービスは？",opts:["SQS Standard Queue → Lambda","Kinesis Data Streams → Lambda (拡張ファンアウト)","SNS → SQS → Lambda","API Gateway → Lambda直接呼び出し"],ans:1,why:"Kinesis Data Streamsはシャード単位でスループットを線形スケール。拡張ファンアウトで複数Lambdaコンシューマーが独立した帯域で並列処理可能。秒間50万レコードには50シャード程度で対応できます。",trap:"SQSはFIFO Queueでも300 TPS/秒程度で、秒間50万レコードには対応困難。API Gatewayのバーストリミット(10,000 req/s)でも不足。",cmp:[{svc:"Kinesis DS",feature:"数MB/s〜GB/s",rto:"シャード拡張",cost:"中",note:"✓ 推奨"},{svc:"SQS",feature:"数千〜数万 msg/s",rto:"スケーラブル",cost:"低",note:"高スループット制約"},{svc:"MSK (Kafka)",feature:"数GB/s",rto:"大規模",cost:"高",note:"超大規模IoT向け"}],kws:["Kinesis Data Streams","拡張ファンアウト","シャード","IoT","高スループット"]},
  {domain:"ネットワーク",cat:"セキュリティ",diff:"Medium",q:"VPCのすべての送受信トラフィックをログに記録して、セキュリティ調査や不審な通信の特定に使いたい。最適なサービスは？",opts:["CloudTrailを有効化する","VPC Flow Logsを有効化してS3またはCloudWatch Logsに送信","ALBアクセスログを有効化","GuardDutyのみ有効化"],ans:1,why:"VPC Flow LogsはVPCのENIを通過する全トラフィック(送受信元IP・ポート・プロトコル・バイト数・許可/拒否)を記録する。CloudTrailはAPIコールの記録でネットワーク通信は記録しない。GuardDutyはVPC Flow Logsを分析するが、ログ自体の保存はVPC Flow Logsが必要。",trap:"CloudTrailはAPI操作の記録でネットワーク通信のログではない。ALBアクセスログはALBへのHTTPリクエストのみ。GuardDutyは脅威検知サービスでFlow Logsの代替ではない。",cmp:[{svc:"VPC Flow Logs",feature:"全ENIトラフィックを記録",rto:"S3/CWLogsに保存",cost:"低",note:"✓ 推奨"},{svc:"CloudTrail",feature:"API操作ログ",rto:"ネットワーク通信は記録しない",cost:"低",note:"目的が異なる"},{svc:"GuardDuty",feature:"脅威検知",rto:"Flow Logsを分析",cost:"有料",note:"ログ保存はFlow Logsが別途必要"}],kws:["VPC Flow Logs","ネットワークログ","ENI","不審な通信","セキュリティ調査"]},
  {domain:"ネットワーク",cat:"セキュリティ",diff:"Hard",q:"VPC内の全インバウンド・アウトバウンドトラフィックをステートフルにフィルタリングし、IDS/IPS機能も持たせたい。セキュリティグループやNACLでは実現できない高度なL7制御を追加したい。最適なサービスは？",opts:["セキュリティグループのルールを強化","AWS Network Firewall","WAFをVPC内に配置","GuardDuty + Lambda自動遮断"],ans:1,why:"AWS Network FirewallはVPC内にデプロイするマネージドのステートフルファイアウォール。Suricataベースのルールでドメインフィルタリング・IDS/IPS・プロトコル検査が可能。セキュリティグループ(インスタンスレベル)・NACL(サブネットレベル)に加えてVPCレベルの高度なL7制御を追加できる。",trap:"セキュリティグループはL4でステートフルだがL7の詳細検査はできない。WAFはALB/CloudFrontのHTTP保護でVPC全体のトラフィックには対応しない。GuardDuty+Lambdaは事後対応で予防的なリアルタイム遮断ではない。",cmp:[{svc:"Network Firewall",feature:"VPCレベルL7フィルタ・IDS/IPS",rto:"ステートフル",cost:"中",note:"✓ 推奨"},{svc:"セキュリティグループ",feature:"インスタンスレベルL4",rto:"ステートフル",cost:"無料",note:"L7検査不可"},{svc:"NACL",feature:"サブネットレベルL4",rto:"ステートレス",cost:"無料",note:"L7検査不可"}],kws:["Network Firewall","IDS/IPS","L7フィルタリング","Suricata","ステートフル"]},
  {domain:"セキュリティ",cat:"認証・認可",diff:"Medium",q:"モバイルアプリのユーザー認証を実装したい。ユーザー登録・ログイン・MFA・ソーシャルログイン(Google/Facebook)を短期間で構築し、認証後にAWSリソース(S3等)に直接アクセスさせたい。最適な構成は？",opts:["IAMユーザーをユーザーごとに作成","Cognito ユーザープール(認証) + Cognito IDプール(AWS認証情報の払い出し)","Lambda + DynamoDBで独自認証を実装","API Gateway + カスタムオーソライザー"],ans:1,why:"Cognitoユーザープールはユーザー管理・MFA・ソーシャルフェデレーションを提供するマネージド認証基盤。IDプール(Federated Identities)はユーザープールのトークンをIAM一時認証情報に交換しS3等のAWSリソースに直接アクセスさせる。両者の組み合わせがモバイルアプリの標準構成。",trap:"IAMユーザーを全ユーザー分作成するのは管理が現実的でない。独自認証の実装はMFA・ソーシャルログインを一から構築する必要があり工数が膨大。APIゲートウェイのカスタムオーソライザーはトークン検証には使えるがユーザー管理はできない。",cmp:[{svc:"Cognito UP+IDプール",feature:"認証+AWS認証情報払い出し",rto:"フルマネージド",cost:"MAUベース",note:"✓ 推奨"},{svc:"IAMユーザー",feature:"シンプル",rto:"大量ユーザーに不向き",cost:"無料",note:"管理が現実的でない"},{svc:"独自実装",feature:"完全カスタム",rto:"開発工数が膨大",cost:"高",note:"車輪の再発明"}],kws:["Cognito","ユーザープール","IDプール","MFA","ソーシャルログイン"]},
  {domain:"設計",cat:"ロードバランシング",diff:"Medium",q:"サードパーティのファイアウォールアプライアンス(仮想アプライアンス)をVPC内に挟み込んで全トラフィックを検査したい。最もシームレスにトラフィックを転送できるロードバランサーは？",opts:["Application Load Balancer(ALB)","Network Load Balancer(NLB)","Gateway Load Balancer(GWLB)","Classic Load Balancer"],ans:2,why:"GWLBはサードパーティのネットワークアプライアンス(ファイアウォール・IDS/IPS等)のトラフィック転送に特化したロードバランサー。GENEVE(6081ポート)でパケットをカプセル化してアプライアンスに透過的に転送する。VPCエンドポイントサービスとの統合でマルチVPN構成も容易。",trap:"ALBはHTTP/HTTPSのL7ロードバランサーでネットワークアプライアンスへの透過転送には向かない。NLBはL4でTCP/UDP転送だがGENEVEカプセル化による透過転送はGWLBの機能。CLBはレガシーで非推奨。",cmp:[{svc:"GWLB",feature:"アプライアンス透過転送・GENEVE",rto:"L3ゲートウェイ",cost:"低",note:"✓ アプライアンス向け"},{svc:"ALB",feature:"HTTP/HTTPS L7",rto:"パスベースルーティング",cost:"低",note:"アプライアンス転送に不向き"},{svc:"NLB",feature:"TCP/UDP L4高性能",rto:"静的IP",cost:"低",note:"GENEVEカプセル化なし"}],kws:["Gateway Load Balancer","GWLB","GENEVE","ネットワークアプライアンス","透過転送"]},
  {domain:"監視",cat:"コンプライアンス",diff:"Medium",q:"AWSリソースの設定変更を継続的に記録し、過去の設定状態に戻せるようにしたい。また特定の設定(S3パブリックアクセス等)への変更を検出したい。最適なサービスは？",opts:["CloudTrailのみ有効化","AWS Config + Config Rules","CloudWatch + EventBridge","Security Hubのみ有効化"],ans:1,why:"AWS Configはリソースの設定変更を継続的に記録し、設定の変更履歴と関係性をタイムラインで可視化する。Config Rulesで設定の評価・非準拠の検出が可能。設定スナップショットにより過去の設定状態への参照も可能。",trap:"CloudTrailはAPIコールの操作ログでリソース設定の詳細な変更履歴ではない。CloudWatch+EventBridgeは特定イベントのトリガーには使えるが設定変更の継続記録はできない。Security HubはConfigを含む統合ダッシュボードだが設定記録機能自体はConfigが担う。",cmp:[{svc:"AWS Config",feature:"設定変更履歴+ルール評価",rto:"継続的記録",cost:"記録数従量",note:"✓ 推奨"},{svc:"CloudTrail",feature:"API操作ログ",rto:"操作の記録",cost:"低",note:"設定の詳細な変更履歴は別"},{svc:"Security Hub",feature:"統合セキュリティダッシュボード",rto:"Configが必要",cost:"有料",note:"Configの上に乗るレイヤー"}],kws:["AWS Config","Config Rules","設定変更履歴","コンプライアンス","タイムライン"]},
  {domain:"データ",cat:"データ設計",diff:"Medium",q:"DynamoDBのテーブルへの変更(INSERT/UPDATE/DELETE)をリアルタイムに検知して、別のシステムに同期したい。最適な構成は？",opts:["DynamoDBを定期的にスキャンしてポーリング","DynamoDB Streams + Lambda","DynamoDBのトリガーをIAMで設定","CloudTrailでDynamoDB操作を監視してEventBridgeで通知"],ans:1,why:"DynamoDB Streamsはテーブルへの変更イベント(新旧の項目値)を順序付きストリームとして提供する。Lambdaをストリームのコンシューマーとして設定することで変更を即座に処理できる。OpenSearch/ElastiCache/別DynamoDBへのリアルタイム同期に活用される。",trap:"ポーリングスキャンは変更の遅延が生じコストも高い。CloudTrailはDynamoDBのAPIコールを記録するが項目の新旧値は含まれない。IAMではトリガー設定はできない。",cmp:[{svc:"DynamoDB Streams+Lambda",feature:"リアルタイム変更検知",rto:"ミリ秒",cost:"ストリーム読み取り料金",note:"✓ 推奨"},{svc:"定期スキャン",feature:"シンプル",rto:"遅延あり",cost:"スキャン料金",note:"変更の見逃しリスク"},{svc:"CloudTrail",feature:"API操作記録",rto:"項目値は含まれない",cost:"低",note:"目的が異なる"}],kws:["DynamoDB Streams","Lambda","変更データキャプチャ","リアルタイム同期","CDC"]},
  {domain:"データ",cat:"データ分析",diff:"Medium",q:"ログデータをリアルタイムに検索・分析・可視化したい。フルテキスト検索と時系列ダッシュボードが必要。最適なサービスは？",opts:["AthenaでS3を直接クエリ","Amazon OpenSearch Service(旧Elasticsearch Service)","Redshiftで分析","CloudWatch Logs Insightsで確認"],ans:1,why:"OpenSearch Serviceはフルテキスト検索・ファセット検索・リアルタイム分析をマネージドで提供する。Kibana(OpenSearch Dashboards)で時系列グラフ・ヒートマップ等のダッシュボードを作成できる。Kinesis Firehose経由でログをリアルタイムに投入できる。",trap:"Athenaはバッチ的なSQLクエリでリアルタイム検索やフルテキスト検索は不得意。Redshiftは構造化データのDWHでフルテキスト検索には向かない。CloudWatch Logs Insightsはシンプルなクエリには使えるがリッチなダッシュボード機能はない。",cmp:[{svc:"OpenSearch Service",feature:"フルテキスト検索+ダッシュボード",rto:"リアルタイム",cost:"インスタンス料金",note:"✓ 推奨"},{svc:"Athena",feature:"SQL on S3",rto:"バッチクエリ",cost:"スキャン量従量",note:"フルテキスト検索不得意"},{svc:"CloudWatch Logs Insights",feature:"シンプルなログクエリ",rto:"リアルタイム",cost:"スキャン量従量",note:"ダッシュボード機能が限定的"}],kws:["OpenSearch","Elasticsearch","フルテキスト検索","Kibana","ログ分析"]}
];

let cur=0,answered=false,total=0,ok=0,ng=0,streak=0,activeDomain="全て",pool=[],domainStats={};
DOMAINS.slice(1).forEach(d=>{domainStats[d]={ok:0,total:0}});

function countDomain(d){return d==="全て"?QS.length:QS.filter(q=>q.domain===d).length}
function buildPool(){pool=QS.filter(q=>activeDomain==="全て"||q.domain===activeDomain).sort(()=>Math.random()-.5);cur=0}

function initCats(){
  const r=document.getElementById('catRow');
  DOMAINS.forEach(d=>{
    const cnt=countDomain(d);
    const b=document.createElement('button');
    b.className='cat'+(d==="全て"?' on':'');
    b.disabled=cnt===0;
    b.innerHTML=d+(d!=="全て"?`<span class="cat-cnt">${cnt}</span>`:'');
    b.onclick=()=>{
      document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');activeDomain=d;buildPool();renderQ();
    };
    r.appendChild(b);
  });
}

function renderQ(){
  document.getElementById('result').classList.remove('show');
  document.getElementById('qCard').style.display='block';
  if(cur>=pool.length){showResult();return}
  const q=pool[cur];
  answered=false;
  document.getElementById('qCat').textContent=q.cat;
  document.getElementById('qDiff').textContent=q.diff;
  document.getElementById('qDiff').className='badge '+(DIFF_COLORS[q.diff]||'b-amber');
  document.getElementById('qDomain').textContent=q.domain;
  document.getElementById('qDomain').className='badge '+(DOMAIN_COLORS[q.domain]||'b-purple');
  document.getElementById('qNum').textContent=(cur+1)+' / '+pool.length;
  document.getElementById('progFill').style.width=(cur/pool.length*100)+'%';
  document.getElementById('qTxt').textContent=q.q;
  const oc=document.getElementById('opts');oc.innerHTML='';
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');d.className='opt';
    d.innerHTML=`<div class="opt-k">${'ABCDE'[i]}</div><div class="opt-t">${o}</div>`;
    d.onclick=()=>selectOpt(i);oc.appendChild(d);
  });
  document.getElementById('exp').className='exp';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('streakBadge').textContent='';
  document.getElementById('streakBadge').className='';
}

function selectOpt(i){
  if(answered)return;answered=true;
  const q=pool[cur];
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('dis'));
  const opts=document.querySelectorAll('.opt');
  if(i===q.ans){opts[i].classList.add('ok');ok++;streak++;if(domainStats[q.domain])domainStats[q.domain].ok++}
  else{opts[i].classList.add('ng');opts[q.ans].classList.add('show-ok');ng++;streak=0}
  total++;
  if(domainStats[q.domain])domainStats[q.domain].total++;
  updateStats();
  document.getElementById('expWhy').textContent=q.why;
  document.getElementById('expTrap').textContent=q.trap;
  const cw=document.getElementById('cmpWrap');
  if(q.cmp&&q.cmp.length){
    cw.innerHTML=`<div class="cmp-wrap"><table class="cmp-tbl"><thead><tr><th>サービス</th><th>特徴・RPO目安</th><th>RTO目安</th><th>コスト</th><th>備考</th></tr></thead><tbody>`+
    q.cmp.map((r,ri)=>`<tr ${ri===0?'class="rec"':''}><td>${r.svc}</td><td>${r.feature}</td><td>${r.rto}</td><td>${r.cost}</td><td>${r.note}</td></tr>`).join('')+
    `</tbody></table></div>`;
  }else{cw.innerHTML=''}
  document.getElementById('kwWrap').innerHTML=q.kws.map(k=>`<span class="kw">${k}</span>`).join('');
  document.getElementById('exp').className='exp show';
  document.getElementById('nextBtn').style.display='inline-flex';
  if(streak>=3){const sb=document.getElementById('streakBadge');sb.className='streak';sb.textContent=streak+'連続正解 🔥'}
}

function updateStats(){
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sOk').textContent=ok;
  document.getElementById('sNg').textContent=ng;
  document.getElementById('sRate').textContent=total>0?Math.round(ok/total*100)+'%':'—';
}
function nextQ(){cur++;renderQ()}
function skipQ(){cur++;renderQ()}

function showResult(){
  document.getElementById('qCard').style.display='none';
  document.getElementById('result').classList.add('show');
  const rate=total>0?Math.round(ok/total*100):0;
  document.getElementById('resultSc').textContent=ok+'/'+total;
  document.getElementById('resultRate').textContent=rate+'%';
  const circ=314;
  document.getElementById('resultArc').setAttribute('stroke-dasharray',Math.round(circ*rate/100)+' '+circ);
  document.getElementById('resultArc').setAttribute('stroke',rate>=75?'#34D058':rate>=50?'#E3B341':'#F85149');
  document.getElementById('resultMsg').textContent=rate>=75?'合格圏内です！この調子で本番も突破しましょう！':rate>=50?'半分以上正解！苦手分野を絞って復習しよう。':'基礎から丁寧に積み上げていきましょう。';
  const dg=document.getElementById('domainGrid');
  dg.innerHTML=Object.entries(domainStats).filter(([,v])=>v.total>0).map(([d,v])=>`
    <div class="domain-card">
      <div class="domain-name">${d}</div>
      <div class="domain-bar"><div class="domain-bar-fill" style="width:${Math.round(v.ok/v.total*100)}%"></div></div>
      <div class="domain-rate">${v.ok}/${v.total} · ${Math.round(v.ok/v.total*100)}%</div>
    </div>`).join('');
}

function restart(){
  cur=0;total=0;ok=0;ng=0;streak=0;
  DOMAINS.slice(1).forEach(d=>{domainStats[d]={ok:0,total:0}});
  activeDomain="全て";
  document.querySelectorAll('.cat').forEach((b,i)=>b.classList.toggle('on',i===0));
  updateStats();buildPool();
  document.getElementById('result').classList.remove('show');
  document.getElementById('qCard').style.display='block';
  renderQ();
}

initCats();buildPool();renderQ();
</script>
</body>
</html>
